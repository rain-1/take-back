<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>take-back</title>
<style>
  :root {
    color-scheme: dark;
    --bg:        #0b0d11;
    --panel:     #11141b;
    --surface:   #171b24;
    --surface-2: #1e2431;
    --border:    #232936;
    --border-soft: #1a1f29;
    --text:      #e8eaf0;
    --muted:     #8a93a6;
    --dim:       #5a6273;
    --accent:    #5b8cff;
    --accent-dim:#2f4a8f;
    --online:    #34d399;
    --danger:    #f87171;
    --radius:    10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .hidden { display: none !important; }

  /* ---- Scrollbars ---- */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #262c39; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #323a4a; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ---- Controls ---- */
  button {
    font: inherit; font-size: .875rem; font-weight: 550;
    padding: .5rem .85rem; border-radius: var(--radius); border: 1px solid transparent;
    background: var(--accent); color: #fff; cursor: pointer;
    transition: background .15s ease, border-color .15s ease, opacity .15s ease;
  }
  button:hover { background: #6f9bff; }
  button.secondary { background: var(--surface-2); color: var(--text); border-color: var(--border); }
  button.secondary:hover { background: #262d3c; }
  button.ghost { background: transparent; color: var(--dim); padding: .25rem .45rem; border: 0; }
  button.ghost:hover { color: var(--text); background: var(--surface-2); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  input {
    font: inherit; font-size: .9rem; width: 100%;
    padding: .5rem .7rem; border-radius: var(--radius);
    border: 1px solid var(--border); background: #0d1016; color: var(--text);
    transition: border-color .15s ease;
  }
  input::placeholder { color: var(--dim); }
  input:focus { border-color: var(--accent-dim); outline: none; }

  .err { color: var(--danger); font-size: .78rem; min-height: 1em; }

  /* ---- Auth ---- */
  #auth { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 1rem; }
  #auth .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.75rem; width: 340px;
    box-shadow: 0 12px 40px rgba(0,0,0,.45);
  }
  #auth .brand { font-size: 1.25rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: .15rem; }
  #auth h2 { margin: 0 0 1.25rem; font-size: .875rem; font-weight: 450; color: var(--muted); }
  #auth input { margin-bottom: .6rem; }
  #auth .toggle { color: var(--muted); font-size: .82rem; margin-top: 1rem; text-align: center; }
  #auth .toggle a { color: var(--accent); cursor: pointer; font-weight: 500; }
  #auth .toggle a:hover { text-decoration: underline; }

  /* ---- Shell ---- */
  header {
    padding: 0 1rem; height: 52px; display: flex; align-items: center; gap: .6rem;
    border-bottom: 1px solid var(--border-soft); background: var(--panel);
  }
  header h1 { font-size: .95rem; margin: 0; font-weight: 650; letter-spacing: -.01em; }
  header .sub { color: var(--dim); font-size: .78rem; }
  #app { display: flex; height: calc(100vh - 52px); }

  /* ---- Sidebar ---- */
  #sidebar {
    width: 272px; flex: none; background: var(--panel);
    border-right: 1px solid var(--border-soft);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .section { padding: .6rem .8rem; border-bottom: 1px solid var(--border-soft); }
  .section:last-child { border-bottom: 0; }
  .section h3 {
    margin: 0 0 .35rem .25rem; font-size: .66rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .09em; color: var(--dim);
  }
  .addrow { display: flex; gap: .35rem; }
  .addrow input { flex: 1; min-width: 0; padding: .35rem .55rem; font-size: .82rem; }
  .addrow button { padding: .35rem .7rem; font-size: .8rem; }

  /* Sidebar rows (friends + groups) */
  .row {
    display: flex; align-items: center; gap: .6rem;
    padding: .45rem .5rem; border-radius: var(--radius);
    cursor: pointer; position: relative;
    transition: background .12s ease;
  }
  .row:hover { background: var(--surface); }
  .row.active { background: var(--surface-2); box-shadow: inset 2px 0 0 var(--accent); }
  .row .name { flex: 1; min-width: 0; font-size: .9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row.unread .name { font-weight: 650; color: #fff; }
  .row .rm { opacity: 0; transition: opacity .12s ease; }
  .row:hover .rm { opacity: 1; }

  /* Avatar */
  .avatar {
    width: 28px; height: 28px; flex: none; border-radius: 50%;
    display: grid; place-items: center;
    font-size: .72rem; font-weight: 650; color: #fff; letter-spacing: .02em;
  }
  .avatar.group { border-radius: 8px; background: var(--surface-2); color: var(--muted); }

  /* Presence dot — sits as a badge on the avatar's corner */
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #39404f; flex: none; }
  .dot.online { background: var(--online); }
  .avatar-wrap { position: relative; flex: none; display: block; line-height: 0; }
  .avatar-wrap .dot {
    position: absolute; right: -1px; bottom: -1px;
    width: 10px; height: 10px; border: 2px solid var(--panel); border-radius: 50%;
  }
  .row:hover .avatar-wrap .dot, .row.active .avatar-wrap .dot { border-color: var(--surface-2); }

  /* Unread pip */
  .pip {
    flex: none; min-width: 18px; height: 18px; padding: 0 5px;
    border-radius: 9px; background: var(--accent); color: #fff;
    font-size: .68rem; font-weight: 700; line-height: 18px; text-align: center;
  }
  .pip.dot-only { min-width: 8px; width: 8px; height: 8px; padding: 0; border-radius: 50%; }

  /* Requests */
  .req { display: flex; align-items: center; gap: .4rem; padding: .3rem .25rem; font-size: .88rem; }
  .req .name { flex: 1; }
  .req button { padding: .22rem .5rem; font-size: .75rem; }

  .empty-note { color: var(--dim); font-size: .8rem; padding: .5rem .25rem; }

  /* ---- Chat ---- */
  #chat { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  #chatHeader {
    height: 56px; flex: none; padding: 0 1rem; display: flex; align-items: center; gap: .55rem;
    border-bottom: 1px solid var(--border-soft); background: var(--panel);
  }
  #chatHeader .nick { font-weight: 600; font-size: .95rem; }
  #chatHeader .sub { color: var(--dim); font-size: .75rem; }

  #membersPanel {
    padding: .6rem 1rem; border-bottom: 1px solid var(--border-soft);
    display: flex; flex-wrap: wrap; gap: .4rem; background: #0e1117;
  }
  .chip {
    display: flex; align-items: center; gap: .35rem;
    background: var(--surface); border: 1px solid var(--border);
    padding: .2rem .55rem; border-radius: 999px; font-size: .78rem;
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 1rem .5rem;
    display: flex; flex-direction: column;
  }
  /* Slack/Discord-style groups: everyone in one left-aligned column, avatar and
     name shown once per run of consecutive messages from the same sender. */
  .grp { display: flex; gap: .6rem; padding: .1rem .5rem; }
  .grp.newgroup { margin-top: .55rem; }
  .grp-av { width: 36px; flex: none; padding-top: .15rem; }
  .grp-av .avatar { width: 36px; height: 36px; font-size: .82rem; }
  .grp-main { flex: 1; min-width: 0; }
  /* padding-left matches .msg's left padding so the name lines up exactly with
     the message text below it (they'd otherwise be offset by that padding). */
  .grp-head { display: flex; align-items: baseline; gap: .5rem; margin-bottom: .1rem; padding-left: .4rem; }
  .grp-head .name { font-weight: 650; font-size: .9rem; color: var(--text); }
  .grp-head .htime { font-size: .68rem; color: var(--dim); }

  .msg {
    position: relative; padding: .1rem .4rem .1rem .4rem; border-radius: 6px;
    word-wrap: break-word; overflow-wrap: anywhere;
    transition: background .1s ease;
  }
  .msg:hover { background: var(--surface); }
  .msg .body p { margin: 0; }
  .msg .body p + p { margin-top: .4rem; }
  .msg .body code {
    background: rgba(0,0,0,.35); padding: .08rem .32rem; border-radius: 5px;
    font-family: ui-monospace, SFMono-Regular, monospace; font-size: .85em;
  }
  .msg .body a { color: #9dc0ff; }
  .msg .body blockquote {
    margin: .15rem 0; padding: .05rem .6rem; border-left: 3px solid var(--border);
    color: var(--muted);
  }
  .msg img.thumb {
    max-width: 260px; max-height: 240px; border-radius: 10px;
    margin-top: .35rem; display: block; cursor: zoom-in;
    transition: opacity .15s ease;
  }
  .msg img.thumb:hover { opacity: .9; }
  /* Timestamp: tucked to the right, and only fully visible on hover so it
     doesn't compete with the message text. */
  .msg .time {
    font-size: .63rem; color: var(--dim); text-align: right;
    margin-top: .1rem; opacity: .55; transition: opacity .15s ease;
  }
  .msg:hover .time { opacity: 1; }
  .msg .edited { font-style: italic; }
  .callmsg button { margin-top: .35rem; }

  /* Hover toolbar, top-right of each message (Slack-style). */
  .msg .timerow {
    position: absolute; top: -.6rem; right: .3rem; z-index: 2;
    display: flex; align-items: center; gap: .1rem;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: .1rem .2rem; opacity: 0; pointer-events: none; transition: opacity .1s ease;
  }
  .msg:hover .timerow { opacity: 1; pointer-events: auto; }
  .msg .timerow .time { position: static; opacity: 1; margin: 0 .2rem; }
  .msg .editbtn {
    font-size: .68rem; padding: .1rem .25rem; line-height: 1.3;
    background: transparent; border: 0; color: var(--muted);
    border-radius: 5px; cursor: pointer; font-weight: 500;
  }
  .msg .editbtn:hover { color: var(--text); background: var(--surface-2); }
  .msg .editbox {
    width: 100%; min-width: 220px; font: inherit; font-size: .9rem;
    background: #0d1016; color: var(--text);
    border: 1px solid var(--accent-dim); border-radius: 8px; padding: .35rem .5rem;
  }
  .msg .edithint { font-size: .62rem; color: var(--dim); margin-top: .25rem; }

  /* Reply quote shown above a message that is a reply */
  .msg .quote {
    border-left: 3px solid var(--accent-dim); padding: .1rem .5rem; margin-bottom: .3rem;
    background: rgba(0,0,0,.18); border-radius: 0 6px 6px 0; cursor: pointer;
    font-size: .78rem; color: var(--muted); max-width: 100%;
  }
  .msg .quote b { color: #bcd0ff; font-weight: 600; }
  .msg .quote .qt { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .react-add.reply { }
  /* brief highlight when you jump to a message */
  .msg.flash { animation: flash 1.1s ease; }
  @keyframes flash {
    0%, 30% { background: rgba(91,140,255,.28); }
    100% { background: var(--surface); }
  }
  .msg.me.flash { animation: flashme 1.1s ease; }
  @keyframes flashme {
    0%, 30% { background: rgba(91,140,255,.5); }
    100% { background: var(--accent-dim); }
  }
  /* composer reply preview */
  #replyBar {
    display: none; align-items: center; gap: .5rem; padding: .35rem .6rem;
    border-top: 1px solid var(--border-soft); background: #0e1117;
    font-size: .8rem; color: var(--muted);
  }
  #replyBar.show { display: flex; }
  #replyBar .qt { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #replyBar b { color: #bcd0ff; }
  #replyBar .x { cursor: pointer; color: var(--dim); padding: 0 .3rem; }
  #replyBar .x:hover { color: var(--text); }

  /* Reactions */
  .reactions { display: flex; flex-wrap: wrap; gap: .25rem; margin-top: .3rem; }
  .reaction {
    display: inline-flex; align-items: center; gap: .2rem;
    font-size: .78rem; line-height: 1; padding: .12rem .4rem;
    border-radius: 999px; cursor: pointer; user-select: none;
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    transition: background .12s ease, border-color .12s ease;
  }
  .reaction:hover { border-color: var(--accent-dim); }
  .reaction.mine { background: rgba(91,140,255,.16); border-color: var(--accent-dim); }
  .reaction .rc { font-size: .68rem; color: var(--muted); }
  .reaction.mine .rc { color: #bcd0ff; }
  /* the add-reaction affordance, revealed on message hover */
  .react-add {
    font-size: .82rem; padding: .1rem .3rem; border-radius: 6px;
    background: transparent; border: 0; color: var(--muted); cursor: pointer;
  }
  .react-add:hover { color: var(--text); background: var(--surface-2); }
  .msg.me .editbtn:hover { color: #fff; background: rgba(255,255,255,.14); }
  .react-add:hover { color: var(--text); background: var(--surface); border-color: var(--border); }

  /* Emoji picker popover */
  #emojiPicker {
    position: fixed; z-index: 30; display: none;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: .4rem; box-shadow: 0 10px 30px rgba(0,0,0,.5);
    grid-template-columns: repeat(6, 1fr); gap: .1rem;
  }
  #emojiPicker.show { display: grid; }
  #emojiPicker button {
    background: transparent; border: 0; font-size: 1.1rem; padding: .25rem;
    border-radius: 8px; cursor: pointer;
  }
  #emojiPicker button:hover { background: var(--surface-2); }

  #empty {
    flex: 1; display: flex; flex-direction: column; gap: .4rem;
    align-items: center; justify-content: center; color: var(--dim);
  }
  #empty .big { font-size: 2rem; opacity: .5; }

  #composer {
    flex: none; border-top: 1px solid var(--border-soft); background: var(--panel);
    padding: .6rem .8rem; display: flex; gap: .45rem; align-items: center;
  }
  #composer input[type=text] { flex: 1; border-radius: 999px; padding: .55rem .9rem; }
  #composer button { border-radius: 999px; }
  #composer .icon { padding: .45rem .6rem; font-size: 1rem; }

  #log { position: fixed; bottom: .4rem; left: .8rem; font-size: .72rem; color: var(--dim); }
  #toast {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    padding: .5rem .85rem; border-radius: 999px; font-size: .82rem;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); z-index: 20;
    opacity: 0; pointer-events: none; transition: opacity .18s ease;
  }
  #toast.show { opacity: 1; }

  /* ---- Small screens ---- */
  @media (max-width: 720px) {
    #sidebar { width: 100%; position: absolute; inset: 52px 0 0 0; z-index: 5; }
    #sidebar.tucked { display: none; }
    .msg { max-width: 85%; }
  }
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth">
  <div class="card">
    <div class="brand">take-back</div>
    <h2 id="authTitle">Sign in to continue</h2>
    <input id="authNick" placeholder="nickname" autocomplete="username">
    <input id="authPass" type="password" placeholder="password" autocomplete="current-password">
    <div class="err" id="authErr"></div>
    <button id="authBtn" style="width:100%;">Log in</button>
    <div class="toggle" id="authToggle">No account? <a>Register</a></div>
  </div>
</div>

<div id="toast"></div>
<div id="emojiPicker"></div>

<!-- ============ APP ============ -->
<div id="main" class="hidden">
  <header>
    <h1>take-back</h1>
    <span class="sub" id="verLabel"></span>
    <span style="flex:1;"></span>
    <span class="sub hidden" id="staleWarn" style="color:var(--danger);cursor:pointer;"
          title="Reload to get the current version">⚠ update available — reload</span>
    <span class="sub">signed in as <b id="meNick"></b></span>
    <span id="meAvatar" title="Change your profile picture" style="cursor:pointer;"></span>
    <input type="file" id="avatarInput" accept="image/*" class="hidden">
    <button class="secondary" id="logoutBtn">Log out</button>
  </header>

  <div id="app">
    <aside id="sidebar">
      <div class="section">
        <h3>Add friend</h3>
        <div class="addrow">
          <input id="addNick" placeholder="their nickname" autocomplete="off">
          <button id="addBtn">Add</button>
        </div>
        <div class="err" id="addErr" style="color:#f87171;font-size:.75rem;"></div>
      </div>
      <div class="section">
        <h3>Groups</h3>
        <div class="addrow">
          <input id="groupName" placeholder="new group name" autocomplete="off">
          <button id="newGroupBtn">Create</button>
        </div>
        <div id="groups" style="margin-top:.4rem;"></div>
      </div>
      <div class="section hidden" id="requestsSection">
        <h3>Requests</h3>
        <div id="requests"></div>
      </div>
      <div class="section" style="flex:1;">
        <h3>Friends</h3>
        <div id="friends"></div>
      </div>
    </aside>

    <section id="chat">
      <div id="empty">
        <div class="big">✳</div>
        <div>Pick a conversation to start chatting.</div>
      </div>
      <div id="chatPane" class="hidden" style="flex:1; display:flex; flex-direction:column; min-height:0;">
        <div id="chatHeader">
          <span id="chatAvatar"></span>
          <span class="nick" id="chatNick"></span>
          <span class="sub" id="chatSub" style="color:#8b93a7;font-size:.75rem;"></span>
          <span style="flex:1;"></span>
          <button class="secondary hidden" id="membersBtn">👥 Members</button>
          <button class="secondary" id="callBtn">📹 Video call</button>
        </div>
        <div id="membersPanel" class="hidden" style="padding:.5rem 1rem;border-bottom:1px solid #262a33;display:flex;flex-wrap:wrap;gap:.5rem;"></div>
        <div id="messages"></div>
        <div id="replyBar">
          <span class="qt" id="replyBarText"></span>
          <span class="x" id="replyBarCancel" title="Cancel reply">✕</span>
        </div>
        <div id="composer">
          <button class="secondary icon" id="imgBtn" title="Send image">🖼</button>
          <input type="file" id="imgInput" accept="image/*" class="hidden">
          <input type="text" id="msgInput" placeholder="Message — markdown supported" autocomplete="off">
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
// Wire-protocol version this client speaks. Must match the server's MAJOR /
// protocol; see internal/version. Bump only alongside a breaking API change.
const CLIENT_PROTOCOL = 1;

const $ = (id) => document.getElementById(id);
async function api(path, opts = {}) {
  const res = await fetch(path, { credentials: "same-origin", ...opts });
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || res.statusText);
  return res.status === 204 ? null : res.json();
}

let me = null;
let openFriend = null;       // { id, nick, online } when a DM is open
let openGroup = null;        // { id, name, callCode } when a group is open
let replyingTo = null;       // message being replied to, or null
let events = null;           // events WebSocket
const friendState = new Map(); // id -> friend view
const groupState = new Map();   // id -> group
const groupMembers = new Map(); // userId -> { nick, online } for the open group
let groupInvites = [];          // pending invites awaiting my answer

// ---------- Auth ----------
let registerMode = false;
$("authToggle").onclick = () => {
  registerMode = !registerMode;
  $("authTitle").textContent = registerMode ? "Create a take-back account" : "Log in to take-back";
  $("authBtn").textContent = registerMode ? "Register" : "Log in";
  $("authToggle").innerHTML = registerMode
    ? 'Have an account? <a>Log in</a>' : 'No account? <a>Register</a>';
  $("authToggle").querySelector("a").onclick = $("authToggle").onclick;
};
$("authBtn").onclick = async () => {
  $("authErr").textContent = "";
  const nick = $("authNick").value.trim(), password = $("authPass").value;
  try {
    me = await api(registerMode ? "/api/register" : "/api/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nick, password }),
    });
    enterApp();
  } catch (e) { $("authErr").textContent = e.message; }
};
$("authPass").addEventListener("keydown", (e) => { if (e.key === "Enter") $("authBtn").click(); });

// ---- My profile picture ----
function renderMeAvatar() {
  $("meAvatar").replaceChildren(avatar(me.nick, false, me.avatarUrl));
}
$("meAvatar").onclick = () => $("avatarInput").click();
$("avatarInput").onchange = async () => {
  const file = $("avatarInput").files[0];
  if (!file) return;
  const form = new FormData();
  form.append("image", file);
  try {
    const res = await api("/api/me/avatar", { method: "POST", body: form });
    me.avatarUrl = res.avatarUrl;
    renderMeAvatar();
    toast("Profile picture updated");
    // Refresh lists so friends/members see the change reflected where I appear.
    loadFriends();
  } catch (e) { toast(e.message); }
  $("avatarInput").value = "";
};

$("logoutBtn").onclick = async () => {
  await api("/api/logout", { method: "POST" }).catch(() => {});
  events?.close();
  location.reload();
};

// ---------- App bootstrap ----------
async function enterApp() {
  $("auth").classList.add("hidden");
  $("main").classList.remove("hidden");
  $("meNick").textContent = me.nick;
  renderMeAvatar();
  requestNotifyPermission();
  await loadFriends();
  await loadGroups();
  connectEvents();
}

// ---------- Groups ----------
$("newGroupBtn").onclick = async () => {
  const name = $("groupName").value.trim();
  if (!name) return;
  const g = await api("/api/groups", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name }),
  });
  $("groupName").value = "";
  await loadGroups();
  openGroupChat(g);
};

async function loadGroups() {
  const list = await api("/api/groups");
  groupState.clear();
  list.forEach((g) => groupState.set(g.id, g));
  renderGroups();
  await loadGroupInvites();
}

// Group invites sit in the same tray as friend requests: being added to a group
// is something you agree to, not something done to you.
async function loadGroupInvites() {
  groupInvites = await api("/api/groups/invites").catch(() => []);
  renderFriends(); // the requests tray lives in the friends render
}

async function respondGroupInvite(groupId, accept) {
  await api("/api/groups/respond", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ group: groupId, accept }),
  });
  await loadGroups();
}

function renderGroups() {
  const box = $("groups");
  box.innerHTML = "";
  if (groupState.size === 0) {
    box.innerHTML = `<div class="empty-note">No groups yet.</div>`;
    return;
  }
  for (const g of [...groupState.values()].sort(byRecency((g) => g.name))) {
    const row = document.createElement("div");
    row.className = "row"
      + (openGroup && openGroup.id === g.id ? " active" : "")
      + (g.unread > 0 ? " unread" : "");
    row.append(avatar(g.name, true));

    const name = document.createElement("span");
    name.className = "name";
    name.textContent = g.name;
    row.append(name);

    if (g.unread > 0) {
      row.append(pip(g.unread));
    } else {
      const count = document.createElement("span");
      count.style.cssText = "color:var(--dim);font-size:.72rem;";
      count.textContent = g.memberCount;
      row.append(count);
    }
    row.onclick = () => openGroupChat(g);
    box.append(row);
  }
}

async function openGroupChat(g) {
  cancelReply();
  openFriend = null;
  openGroup = { id: g.id, name: g.name, callCode: g.callCode };
  $("empty").classList.add("hidden");
  $("chatPane").classList.remove("hidden");
  setChatAvatar(g.name, true);
  $("chatNick").textContent = g.name;
  $("membersBtn").classList.remove("hidden");
  $("membersPanel").classList.add("hidden");
  renderGroups();
  renderFriends();
  await loadMembers(g.id);
  const msgs = await api(`/api/groups/messages?group=${g.id}`);
  $("messages").innerHTML = ""; resetGrouping();
  msgs.forEach(appendMessage);
  scrollMessages();
  markRead("group", g.id, msgs);
}

async function loadMembers(groupId) {
  const members = await api(`/api/groups/members?group=${groupId}`);
  groupMembers.clear();
  members.forEach((m) => groupMembers.set(m.id, { nick: m.nick, online: m.online, owner: m.owner }));
  $("chatSub").textContent = members.length + " members";
  renderMembersPanel();
}

function renderMembersPanel() {
  const panel = $("membersPanel");
  panel.innerHTML = "";
  for (const [id, m] of groupMembers) {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.innerHTML = `<span class="dot ${m.online ? "online" : ""}"></span>${esc(m.nick)}${m.owner ? " ★" : ""}${id === me.id ? " (you)" : ""}`;
    panel.append(chip);
  }
  const add = document.createElement("span");
  add.style.cssText = "display:flex;gap:.3rem;align-items:center;";
  add.innerHTML = `<input id="addMemberNick" placeholder="invite by nick" style="width:130px;padding:.2rem .5rem;font-size:.78rem;">`;
  const btn = mkBtn("+", "", async () => {
    const nick = $("addMemberNick").value.trim();
    if (!nick) return;
    try {
      await api("/api/groups/invite", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ group: openGroup.id, nick }) });
      $("addMemberNick").value = "";
      // They don't appear until they accept — say so rather than looking broken.
      toast(`Invited ${nick} — they'll join once they accept.`);
    } catch (e) { alert(e.message); }
  });
  btn.style.padding = ".2rem .5rem";
  add.append(btn);
  panel.append(add);
}

$("membersBtn").onclick = () => $("membersPanel").classList.toggle("hidden");

// ---------- Desktop (tray) notifications ----------
function requestNotifyPermission() {
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
}
// notify shows an OS notification when permitted and the page isn't focused.
// Clicking it focuses the tab (and optionally runs onClick).
function notify(title, body, onClick) {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  if (document.visibilityState === "visible" && document.hasFocus()) return;
  const n = new Notification(title, { body, tag: title });
  n.onclick = () => { window.focus(); n.close(); if (onClick) onClick(); };
}

// Try to resume an existing session on load, and check we're not a stale
// cached page talking to a newer server.
(async () => {
  checkVersion();
  try { me = await api("/api/me"); enterApp(); } catch { /* show auth */ }
})();

// checkVersion shows the server version, and warns if this page's protocol no
// longer matches it (i.e. a cached tab after a breaking deploy).
async function checkVersion() {
  try {
    const v = await api("/api/version");
    $("verLabel").textContent = "v" + v.version;
    if (v.protocol !== CLIENT_PROTOCOL) {
      $("staleWarn").classList.remove("hidden");
      $("staleWarn").onclick = () => location.reload(true);
    }
  } catch { /* offline; ignore */ }
}

// ---------- Friends ----------
$("addBtn").onclick = async () => {
  $("addErr").textContent = "";
  const nick = $("addNick").value.trim();
  if (!nick) return;
  try {
    await api("/api/friends/request", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nick }),
    });
    $("addNick").value = "";
    await loadFriends();
  } catch (e) { $("addErr").textContent = e.message; }
};

async function loadFriends() {
  const list = await api("/api/friends");
  friendState.clear();
  list.forEach((f) => friendState.set(f.user.id, f));
  renderFriends();
}

function renderFriends() {
  const requests = [], accepted = [];
  for (const f of friendState.values()) {
    if (f.status === "pending" && f.direction === "incoming") requests.push(f);
    else if (f.status === "accepted") accepted.push(f);
  }

  // Incoming requests
  const reqBox = $("requests");
  reqBox.innerHTML = "";
  $("requestsSection").classList.toggle("hidden",
    requests.length === 0 && groupInvites.length === 0);

  // Group invites first — they're the newer, more surprising thing.
  groupInvites.forEach((inv) => {
    const row = document.createElement("div");
    row.className = "req";
    row.append(avatar(inv.groupName, true));
    const name = document.createElement("span");
    name.className = "name";
    name.innerHTML = `${esc(inv.groupName)}<div style="font-size:.7rem;color:var(--dim);">invited by ${esc(inv.invitedBy)}</div>`;
    row.append(name);
    row.append(mkBtn("Join", "", () => respondGroupInvite(inv.groupId, true)));
    row.append(mkBtn("Decline", "ghost", () => respondGroupInvite(inv.groupId, false)));
    reqBox.append(row);
  });

  requests.forEach((f) => {
    const row = document.createElement("div");
    row.className = "req";
    row.append(avatar(f.user.nick));
    const name = document.createElement("span");
    name.className = "name";
    name.textContent = f.user.nick;
    row.append(name);
    row.append(mkBtn("Accept", "", () => respond(f.user.id, true)));
    row.append(mkBtn("Decline", "ghost", () => respond(f.user.id, false)));
    reqBox.append(row);
  });

  // Newest conversation first. Deliberately NOT sorted by unread or presence:
  // those change as you click (or as people come and go) and would make rows
  // jump around under the cursor. Never-messaged friends fall to the bottom,
  // alphabetically.
  const box = $("friends");
  box.innerHTML = "";
  accepted.sort(byRecency((f) => f.user.nick));
  accepted.forEach((f) => {
    const row = document.createElement("div");
    row.className = "row"
      + (openFriend && openFriend.id === f.user.id ? " active" : "")
      + (f.unread > 0 ? " unread" : "");
    row.append(avatarWrap(f.user.nick, false, f.online, f.user.avatarUrl));

    const name = document.createElement("span");
    name.className = "name";
    name.textContent = f.user.nick;
    row.append(name);

    if (f.unread > 0) row.append(pip(f.unread));
    else {
      // This unfriends — a destructive, mutual action — so label it and confirm.
      // (There's no "close chat" here: the row *is* the friend, not a tab.)
      const rm = mkBtn("✕", "ghost", (e) => {
        e.stopPropagation();
        const ok = confirm(
          `Remove ${f.user.nick} as a friend?\n\n` +
          `You'll each disappear from the other's friends list and won't be able ` +
          `to message until you're friends again. Your history is kept.`);
        if (ok) removeFriend(f.user.id);
      });
      rm.classList.add("rm");
      rm.title = "Remove friend";
      row.append(rm);
    }
    row.onclick = () => openChat(f.user);
    box.append(row);
  });
  if (accepted.length === 0)
    box.innerHTML = `<div class="empty-note">No friends yet — add someone above.</div>`;
}

// byRecency sorts conversations newest-first, falling back to name for those
// with no messages yet. `nameOf` extracts the display name for that tiebreak.
function byRecency(nameOf) {
  return (a, b) =>
    (b.lastActivity || 0) - (a.lastActivity || 0) ||
    nameOf(a).localeCompare(nameOf(b));
}

// touchActivity bumps a conversation's last-activity so it moves to the top the
// moment a message is sent or received, without refetching the list.
function touchActivity(kind, id, created) {
  const state = kind === "dm" ? friendState.get(id) : groupState.get(id);
  if (!state) return;
  state.lastActivity = created || Math.floor(Date.now() / 1000);
  kind === "dm" ? renderFriends() : renderGroups();
}

// pip renders an unread badge (count, capped at 99+).
function pip(n) {
  const p = document.createElement("span");
  p.className = "pip";
  p.textContent = n > 99 ? "99+" : String(n);
  return p;
}

// setChatAvatar swaps the avatar shown in the chat header.
function setChatAvatar(name, isGroup, online, url) {
  $("chatAvatar").replaceChildren(avatarWrap(name, isGroup, online, url));
}

// avatarWrap is an avatar with an optional presence badge on its corner.
// Pass online=undefined (groups) to omit the badge.
function avatarWrap(name, isGroup, online, url) {
  const wrap = document.createElement("span");
  wrap.className = "avatar-wrap";
  wrap.append(avatar(name, isGroup, url));
  if (online !== undefined) {
    const d = document.createElement("span");
    d.className = "dot" + (online ? " online" : "");
    wrap.append(d);
  }
  return wrap;
}

// avatar renders an uploaded profile picture when available, otherwise a
// colour-from-nick initials circle.
function avatar(nick, isGroup, url) {
  const a = document.createElement("span");
  a.className = "avatar" + (isGroup ? " group" : "");
  if (url) {
    a.style.backgroundImage = `url("${url}")`;
    a.style.backgroundSize = "cover";
    a.style.backgroundPosition = "center";
    a.textContent = "";
  } else if (isGroup) {
    a.textContent = "#";
  } else {
    a.textContent = (nick || "?").slice(0, 2).toUpperCase();
    let h = 0;
    for (let i = 0; i < nick.length; i++) h = (h * 31 + nick.charCodeAt(i)) >>> 0;
    a.style.background = `hsl(${h % 360} 55% 42%)`;
  }
  return a;
}

// avatarUrlFor looks up a user's avatar from state we already hold.
function avatarUrlFor(userId) {
  if (me && userId === me.id) return me.avatarUrl || "";
  const f = friendState.get(userId);
  if (f && f.user.avatarUrl) return f.user.avatarUrl;
  const gm = groupMembers.get(userId);
  return (gm && gm.avatarUrl) || "";
}

async function respond(userId, accept) {
  await api("/api/friends/respond", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ userId, accept }),
  });
  await loadFriends();
}
async function removeFriend(userId) {
  await api("/api/friends/remove", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ userId }),
  });
  if (openFriend && openFriend.id === userId) { openFriend = null; showEmpty(); }
  await loadFriends();
}

// ---------- Chat ----------
function showEmpty() { $("empty").classList.remove("hidden"); $("chatPane").classList.add("hidden"); }

async function openChat(user) {
  cancelReply();
  openFriend = { id: user.id, nick: user.nick };
  openGroup = null;
  $("empty").classList.add("hidden");
  $("chatPane").classList.remove("hidden");
  const f = friendState.get(user.id);
  setChatAvatar(user.nick, false, !!(f && f.online), f && f.user.avatarUrl);
  $("chatNick").textContent = user.nick;
  $("chatSub").textContent = "";
  $("membersBtn").classList.add("hidden");
  $("membersPanel").classList.add("hidden");
  renderGroups();
  renderFriends();
  const msgs = await api(`/api/messages?with=${user.id}`);
  $("messages").innerHTML = ""; resetGrouping();
  msgs.forEach(appendMessage);
  scrollMessages();
  markRead("dm", user.id, msgs);
}

// markRead tells the server we've seen this conversation up to its newest
// message, and clears the local pip immediately.
async function markRead(kind, id, msgs) {
  const lastId = msgs && msgs.length ? msgs[msgs.length - 1].id : 0;
  const state = kind === "dm" ? friendState.get(id) : groupState.get(id);
  const hadUnread = state && state.unread > 0;
  if (state) state.unread = 0;
  if (hadUnread) { renderFriends(); renderGroups(); }
  if (!lastId) return;
  await api("/api/read", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ kind, id, lastId }),
  }).catch(() => {});
}

// bumpUnread increments the local pip for a conversation that isn't open.
function bumpUnread(kind, id) {
  const state = kind === "dm" ? friendState.get(id) : groupState.get(id);
  if (!state) return;
  state.unread = (state.unread || 0) + 1;
  kind === "dm" ? renderFriends() : renderGroups();
}

$("sendBtn").onclick = sendText;
$("msgInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { sendText(); return; }
  // Press ↑ in an empty composer to edit your most recent text message —
  // the shell/Slack convention. Only when empty, so it never eats cursor moves.
  if (e.key === "ArrowUp" && $("msgInput").value === "") {
    const mine = [...allMessageEls()].reverse().find(
      (d) => d._msg && d._msg.senderId === me.id && d._msg.body &&
             !d._msg.body.match(/^📞 call:/));
    if (mine) { e.preventDefault(); startEdit(mine, mine._msg); }
  }
});
function startReply(m) {
  replyingTo = m;
  const who = m.senderId === me.id ? "you"
    : (openGroup ? (groupMembers.get(m.senderId)?.nick || "someone")
                 : (openFriend ? openFriend.nick : "someone"));
  $("replyBarText").innerHTML = `Replying to <b>${esc(who)}</b>: ${esc((m.body || "image").slice(0, 60))}`;
  $("replyBar").classList.add("show");
  $("msgInput").focus();
}
function cancelReply() { replyingTo = null; $("replyBar").classList.remove("show"); }
$("replyBarCancel").onclick = cancelReply;

// jumpToMessage scrolls to a message and briefly flashes it.
function jumpToMessage(id) {
  const div = findMessageEl(id);
  if (!div) { toast("That message isn't loaded"); return; }
  div.scrollIntoView({ behavior: "smooth", block: "center" });
  div.classList.remove("flash"); void div.offsetWidth; div.classList.add("flash");
}

async function sendText() {
  const body = $("msgInput").value.trim();
  if (!body) return;
  $("msgInput").value = "";
  const replyTo = replyingTo ? replyingTo.id : 0;
  cancelReply();
  let msg;
  if (openGroup) {
    msg = await api("/api/groups/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ group: openGroup.id, body, replyTo }),
    });
  } else if (openFriend) {
    msg = await api("/api/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ with: openFriend.id, body, replyTo }),
    });
  } else return;
  appendMessage(msg); scrollMessages();
  touchActivity(openGroup ? "group" : "dm", openGroup ? openGroup.id : openFriend.id, msg.created);
}

$("imgBtn").onclick = () => $("imgInput").click();
$("imgInput").onchange = async () => {
  const file = $("imgInput").files[0];
  if (!file) return;
  const form = new FormData();
  form.append("image", file);
  let msg;
  if (openGroup) {
    form.append("group", openGroup.id);
    msg = await api("/api/groups/messages/image", { method: "POST", body: form });
  } else if (openFriend) {
    form.append("with", openFriend.id);
    msg = await api("/api/messages/image", { method: "POST", body: form });
  } else return;
  appendMessage(msg); scrollMessages();
  touchActivity(openGroup ? "group" : "dm", openGroup ? openGroup.id : openFriend.id, msg.created);
  $("imgInput").value = "";
};

// Grouping state: consecutive messages from the same sender within GROUP_WINDOW
// share one avatar + name header (Slack/Discord style).
const GROUP_WINDOW = 5 * 60; // seconds
let grp = { sender: null, time: 0, main: null };
function resetGrouping() { grp = { sender: null, time: 0, main: null }; }

function senderName(senderId) {
  if (senderId === me.id) return me.nick;
  if (openGroup) return groupMembers.get(senderId)?.nick || "someone";
  return openFriend ? openFriend.nick : "someone";
}

// appendMessage places a message, starting a new sender-group or continuing the
// current one.
function appendMessage(m) {
  const newGroup = m.senderId !== grp.sender ||
    (m.created - grp.time) > GROUP_WINDOW || !grp.main;

  if (newGroup) {
    const row = document.createElement("div");
    row.className = "grp newgroup";
    const av = document.createElement("div");
    av.className = "grp-av";
    av.append(avatar(senderName(m.senderId), false, avatarUrlFor(m.senderId)));
    const main = document.createElement("div");
    main.className = "grp-main";
    const head = document.createElement("div");
    head.className = "grp-head";
    head.innerHTML = `<span class="name">${esc(senderName(m.senderId))}</span>` +
      `<span class="htime">${new Date(m.created * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</span>`;
    main.append(head);
    row.append(av, main);
    $("messages").append(row);
    grp.main = main;
  }
  grp.main.append(messageEl(m));
  grp.sender = m.senderId;
  grp.time = m.created;
}

// messageEl builds one message body (without the sender header — that's on the
// group). Keeps its own quote, reactions, and hover toolbar.
function messageEl(m) {
  const div = document.createElement("div");
  const mine = m.senderId === me.id;
  div.className = "msg";

  let html = "";

  // Quote block for replies — click to jump to the original.
  if (m.replyTo) {
    const who = m.replySender === me.id ? "you"
      : (openGroup ? (groupMembers.get(m.replySender)?.nick || "someone")
                   : (openFriend ? openFriend.nick : "someone"));
    html += `<div class="quote" data-jump="${m.replyTo}"><b>${esc(who)}</b>` +
            `<span class="qt">${esc(m.replyBody || "message")}</span></div>`;
  }

  const call = m.body && m.body.match(/^📞 call:([A-Z0-9]{4,8})$/);
  if (call) {
    div.classList.add("callmsg");
    html += `<div class="body">📞 Video call</div>`;
    div.innerHTML = html;
    div.append(mkBtn("Join call " + call[1], "", () => joinCall(call[1])));
  } else {
    if (m.body) html += `<div class="body">${renderMarkdown(m.body)}</div>`;
    if (m.thumbUrl) html += `<a href="${m.imageUrl}" target="_blank" rel="noopener">
      <img class="thumb" src="${m.thumbUrl}" alt="image"></a>`;
    div.innerHTML = html;
  }

  const t = document.createElement("div");
  t.className = "time";
  t.textContent = new Date(m.created * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  if (m.editedAt) {
    const e = document.createElement("span");
    e.className = "edited";
    e.textContent = " · edited";
    e.title = "Edited " + new Date(m.editedAt * 1000).toLocaleString();
    t.append(e);
  }
  // Reactions row (populated from m.reactions; kept in sync by events).
  const rx = document.createElement("div");
  rx.className = "reactions";
  renderReactions(rx, m);
  div.append(rx);

  // Footer row: edit control (yours only) then the timestamp.
  const row = document.createElement("div");
  row.className = "timerow";

  // Only your own text messages are editable (an image keeps its attachment;
  // call invites aren't text you'd want to rewrite).
  if (mine && !call && m.body) {
    const btn = document.createElement("button");
    btn.className = "editbtn";
    btn.textContent = "✎ edit";
    btn.title = "Edit message";
    btn.onclick = () => startEdit(div, m);
    row.append(btn);
  }
  const reply = document.createElement("button");
  reply.className = "react-add reply";
  reply.textContent = "↩"; reply.title = "Reply";
  reply.onclick = (e) => { e.stopPropagation(); startReply(m); };
  row.append(reply);

  const react = document.createElement("button");
  react.className = "react-add";
  react.textContent = "☺"; react.title = "Add reaction";
  react.onclick = (e) => { e.stopPropagation(); openEmojiPicker(e.currentTarget, m); };
  row.append(react);

  const q = div.querySelector(".quote");
  if (q) q.onclick = () => jumpToMessage(q.dataset.jump);

  row.append(t);
  div.append(row);

  div.dataset.msgId = m.id;
  div._msg = m; // keep the message object for live reaction updates
  return div;
}

// allMessageEls returns every rendered message bubble, across groups.
function allMessageEls() { return $("messages").querySelectorAll(".msg"); }
function findMessageEl(id) {
  return [...allMessageEls()].find((d) => d.dataset.msgId == id);
}

// startEdit swaps the bubble's body for an inline editor.
// Enter saves, Escape cancels — the shortcuts people expect.
function startEdit(div, m) {
  if (div.querySelector(".editbox")) return; // already editing
  const bodyEl = div.querySelector(".body");
  const original = bodyEl ? bodyEl.innerHTML : "";

  const box = document.createElement("textarea");
  box.className = "editbox";
  box.rows = Math.min(6, m.body.split("\n").length);
  box.value = m.body;

  const hint = document.createElement("div");
  hint.className = "edithint";
  hint.textContent = "Enter to save · Esc to cancel";

  if (bodyEl) bodyEl.replaceWith(box); else div.prepend(box);
  box.after(hint);
  box.focus();
  box.setSelectionRange(box.value.length, box.value.length);

  const restore = (html) => {
    const b = document.createElement("div");
    b.className = "body";
    b.innerHTML = html;
    box.replaceWith(b);
    hint.remove();
  };

  box.addEventListener("keydown", async (e) => {
    if (e.key === "Escape") { restore(original); return; }
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      const text = box.value.trim();
      if (!text || text === m.body) { restore(original); return; }
      try {
        const updated = await api("/api/messages/edit", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: m.id, scope: openGroup ? "group" : "dm", body: text }),
        });
        m.body = updated.body;
        m.editedAt = updated.editedAt;
        restore(renderMarkdown(updated.body));
        markEdited(div, updated.editedAt);
      } catch (err) {
        restore(original);
        alert("Couldn't edit: " + err.message);
      }
    }
  });
}

// ---- Reactions ----
const REACTION_CHOICES = ["👍","❤️","😂","🎉","🙏","👀","🔥","😮","😢","💯","✅","🚀"];
let pickerTarget = null; // the message the open picker will react to

function reactionScope() { return openGroup ? "group" : "dm"; }

// renderReactions (re)builds the pill row for a message from m.reactions.
function renderReactions(container, m) {
  container.innerHTML = "";
  (m.reactions || []).forEach((r) => {
    const pill = document.createElement("span");
    pill.className = "reaction" + (r.mine ? " mine" : "");
    pill.title = (r.nicks || []).join(", "); // hover to see who reacted
    pill.innerHTML = `${r.emoji} <span class="rc">${r.count}</span>`;
    pill.onclick = () => toggleReaction(m, r.emoji, !r.mine);
    container.append(pill);
  });
}

async function toggleReaction(m, emoji, add) {
  // Optimistic: the events socket will confirm with the authoritative aggregate.
  try {
    await api("/api/reactions", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ scope: reactionScope(), messageId: m.id, emoji, add }),
    });
  } catch (e) { toast(e.message); }
}

function openEmojiPicker(anchor, m) {
  const p = $("emojiPicker");
  if (!p.dataset.built) {
    REACTION_CHOICES.forEach((e) => {
      const b = document.createElement("button");
      b.textContent = e;
      b.onclick = () => {
        const msg = pickerTarget;
        const existing = (msg.reactions || []).find((r) => r.emoji === e);
        toggleReaction(msg, e, !(existing && existing.mine));
        closeEmojiPicker();
      };
      p.append(b);
    });
    p.dataset.built = "1";
  }
  pickerTarget = m;
  const rect = anchor.getBoundingClientRect();
  p.style.left = Math.min(rect.left, window.innerWidth - 220) + "px";
  p.style.top = (rect.bottom + 6) + "px";
  p.classList.add("show");
}
function closeEmojiPicker() { $("emojiPicker").classList.remove("show"); pickerTarget = null; }
document.addEventListener("click", (e) => {
  if (!e.target.closest("#emojiPicker") && !e.target.closest(".react-add")) closeEmojiPicker();
});

// applyReaction updates one on-screen message's reactions from a live event,
// recomputing our own "mine" flag against the fresh per-user list.
function applyReaction(ev) {
  if (reactionScope() !== ev.scope) return;
  const div = findMessageEl(ev.messageId);
  if (!div || !div._msg) return;
  div._msg.reactions = aggregateReactionList(ev.reactions);
  const row = div.querySelector(".reactions");
  if (row) renderReactions(row, div._msg);
}

// aggregateReactionList mirrors the server aggregation so a live event (raw
// per-user reactions) becomes the grouped shape the UI renders.
function aggregateReactionList(raw) {
  const order = [];
  const byEmoji = {};
  (raw || []).forEach((r) => {
    let g = byEmoji[r.emoji];
    if (!g) { g = byEmoji[r.emoji] = { emoji: r.emoji, count: 0, nicks: [], mine: false }; order.push(r.emoji); }
    g.count++; g.nicks.push(r.nick);
    if (r.userId === me.id) g.mine = true;
  });
  return order.map((e) => byEmoji[e]);
}

// markEdited appends/refreshes the "· edited" marker on a bubble.
function markEdited(div, editedAt) {
  const t = div.querySelector(".time");
  if (!t || !editedAt) return;
  if (!t.querySelector(".edited")) {
    const e = document.createElement("span");
    e.className = "edited";
    e.textContent = " · edited";
    t.append(e);
  }
  t.querySelector(".edited").title = "Edited " + new Date(editedAt * 1000).toLocaleString();
}

// applyEdit updates a message already on screen (someone else edited theirs).
function applyEdit(m) {
  const div = findMessageEl(m.id);
  if (!div) return;
  const bodyEl = div.querySelector(".body");
  if (bodyEl) bodyEl.innerHTML = renderMarkdown(m.body);
  markEdited(div, m.editedAt);
}
function scrollMessages() { const m = $("messages"); m.scrollTop = m.scrollHeight; }

// ---------- Calls ----------
$("callBtn").onclick = async () => {
  if (openGroup) {
    // Group calls use the group's stable call code; announce it in the chat.
    const code = openGroup.callCode;
    await api("/api/groups/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ group: openGroup.id, body: "📞 call:" + code }),
    }).then(appendMessage);
    scrollMessages();
    joinCall(code);
  } else if (openFriend) {
    const code = randomCode();
    await api("/api/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ with: openFriend.id, body: "📞 call:" + code }),
    }).then(appendMessage);
    scrollMessages();
    joinCall(code);
  }
};
function joinCall(code) {
  window.open(`/call.html?room=${encodeURIComponent(code)}&nick=${encodeURIComponent(me.nick)}`, "_blank");
}
function randomCode() {
  const a = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  return Array.from({ length: 6 }, () => a[Math.floor(Math.random() * a.length)]).join("");
}

// ---------- Live events ----------
// The server sends an app-level {"type":"ping"} every ~20s. We record when we
// last heard anything and, if a proxy silently drops the socket (the browser
// won't always fire onclose), the watchdog forces a reconnect — otherwise new
// messages wouldn't arrive until a manual page reload.
let lastEventAt = 0;
let eventsWatchdog = null;
const EVENTS_STALE_MS = 45000; // > 2 missed heartbeats

function connectEvents() {
  const url = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host + "/api/events";
  events = new WebSocket(url);
  events.onopen = () => {
    lastEventAt = Date.now();
    clearInterval(eventsWatchdog);
    eventsWatchdog = setInterval(() => {
      if (Date.now() - lastEventAt > EVENTS_STALE_MS) {
        clearInterval(eventsWatchdog);
        try { events.close(); } catch (_) {} // onclose schedules the reconnect
      }
    }, 10000);
  };
  events.onmessage = (ev) => {
    lastEventAt = Date.now();
    const e = JSON.parse(ev.data);
    if (e.type === "ping") return; // heartbeat only; nothing to render
    if (e.type === "presence") {
      const f = friendState.get(e.userId);
      if (f) { f.online = e.online; renderFriends();
        if (openFriend && openFriend.id === e.userId) setChatAvatar(openFriend.nick, false, e.online, avatarUrlFor(e.userId)); }
      // Update the open group's member roster dot too.
      const gm = groupMembers.get(e.userId);
      if (gm) { gm.online = e.online; if (openGroup) renderMembersPanel(); }
    } else if (e.type === "hello") {
      (e.onlineFriends || []).forEach((id) => { const f = friendState.get(id); if (f) f.online = true; });
      renderFriends();
    } else if (e.type === "message") {
      const m = e.message;
      touchActivity("dm", m.senderId, m.created); // move the conversation to the top
      if (openFriend && m.senderId === openFriend.id) {
        appendMessage(m); scrollMessages();
        markRead("dm", openFriend.id, [m]); // keep it read while we're looking
      } else {
        // Message from someone whose chat isn't open — pip it and notify.
        bumpUnread("dm", m.senderId);
        const from = friendState.get(m.senderId);
        const who = from ? from.user.nick : "someone";
        const preview = m.body ? m.body.slice(0, 80) : "📷 image";
        notify("Message from " + who, preview, () => { if (from) openChat(from.user); });
      }
    } else if (e.type === "friend_request") {
      // A new incoming friend request: refresh the list and raise a notification.
      loadFriends();
      notify("Friend request", e.nick + " wants to be your friend");
    } else if (e.type === "friend_update") {
      // A request we sent was accepted/declined, or a friend removed us.
      loadFriends();
    } else if (e.type === "message_edited") {
      // The other side rewrote a DM we already have on screen.
      if (openFriend && e.message.senderId === openFriend.id) applyEdit(e.message);
    } else if (e.type === "group_message_edited") {
      if (openGroup && e.message.groupId === openGroup.id) applyEdit(e.message);
    } else if (e.type === "reaction") {
      applyReaction(e.message);
    } else if (e.type === "group_message") {
      const m = e.message;
      touchActivity("group", m.groupId, m.created);
      if (openGroup && m.groupId === openGroup.id) {
        appendMessage(m); scrollMessages();
        markRead("group", openGroup.id, [m]);
      } else {
        bumpUnread("group", m.groupId);
        const g = groupState.get(m.groupId);
        const preview = m.body ? m.body.slice(0, 80) : "📷 image";
        notify("Message in " + (g ? g.name : "a group"), preview);
      }
    } else if (e.type === "group_invite") {
      loadGroupInvites();
      notify("Group invite", `${e.nick} invited you to ${e.groupName}`);
    } else if (e.type === "group_update") {
      // Roster/membership changed (userId carries the group id here).
      loadGroups();
      if (openGroup && e.userId === openGroup.id) loadMembers(openGroup.id);
    }
  };
  events.onclose = () => {
    clearInterval(eventsWatchdog);
    setTimeout(() => { if (me) connectEvents(); }, 2000);
  };
}

// ---------- Helpers ----------
let toastTimer = null;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

function mkBtn(label, cls, onclick) {
  const b = document.createElement("button");
  b.textContent = label; if (cls) b.className = cls; b.onclick = onclick; return b;
}
function esc(s) {
  return s.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
// Minimal, safe Markdown: escape first, then apply a small set of inline rules.
function renderMarkdown(src) {
  let s = esc(src);
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
  // Links [text](http/https url) only.
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Blockquotes: any run of lines beginning with "> " becomes one <blockquote>.
  // Done per-line before the newline→<br> conversion; escaped "&gt; " matches
  // the literal "> " the user typed.
  s = s.replace(/(?:^|\n)((?:&gt; ?.*(?:\n|$))+)/g, (m, block) => {
    const inner = block.replace(/(?:^|\n)&gt; ?/g, "\n").replace(/^\n/, "");
    return "\n<blockquote>" + inner.replace(/\n$/, "") + "</blockquote>\n";
  });
  s = s.replace(/\n/g, "<br>");
  // A <br> hugging a blockquote tag is spurious — drop it.
  s = s.replace(/<br>(<\/?blockquote>)/g, "$1").replace(/(<\/?blockquote>)<br>/g, "$1");
  return "<p>" + s + "</p>";
}
</script>
