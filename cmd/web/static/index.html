<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>take-back</title>
<style>
  :root {
    color-scheme: dark;
    --bg:        #0b0d11;
    --panel:     #11141b;
    --surface:   #171b24;
    --surface-2: #1e2431;
    --border:    #232936;
    --border-soft: #1a1f29;
    --text:      #e8eaf0;
    --muted:     #8a93a6;
    --dim:       #5a6273;
    --accent:    #5b8cff;
    --accent-dim:#2f4a8f;
    --online:    #34d399;
    --danger:    #f87171;
    --radius:    10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .hidden { display: none !important; }

  /* ---- Scrollbars ---- */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #262c39; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #323a4a; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ---- Controls ---- */
  button {
    font: inherit; font-size: .875rem; font-weight: 550;
    padding: .5rem .85rem; border-radius: var(--radius); border: 1px solid transparent;
    background: var(--accent); color: #fff; cursor: pointer;
    transition: background .15s ease, border-color .15s ease, opacity .15s ease;
  }
  button:hover { background: #6f9bff; }
  button.secondary { background: var(--surface-2); color: var(--text); border-color: var(--border); }
  button.secondary:hover { background: #262d3c; }
  button.ghost { background: transparent; color: var(--dim); padding: .25rem .45rem; border: 0; }
  button.ghost:hover { color: var(--text); background: var(--surface-2); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  input {
    font: inherit; font-size: .9rem; width: 100%;
    padding: .5rem .7rem; border-radius: var(--radius);
    border: 1px solid var(--border); background: #0d1016; color: var(--text);
    transition: border-color .15s ease;
  }
  input::placeholder { color: var(--dim); }
  input:focus { border-color: var(--accent-dim); outline: none; }

  .err { color: var(--danger); font-size: .78rem; min-height: 1em; }

  /* ---- Auth ---- */
  #auth { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 1rem; }
  #auth .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.75rem; width: 340px;
    box-shadow: 0 12px 40px rgba(0,0,0,.45);
  }
  #auth .brand { font-size: 1.25rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: .15rem; }
  #auth h2 { margin: 0 0 1.25rem; font-size: .875rem; font-weight: 450; color: var(--muted); }
  #auth input { margin-bottom: .6rem; }
  #auth .toggle { color: var(--muted); font-size: .82rem; margin-top: 1rem; text-align: center; }
  #auth .toggle a { color: var(--accent); cursor: pointer; font-weight: 500; }
  #auth .toggle a:hover { text-decoration: underline; }

  /* ---- Shell ---- */
  header {
    padding: 0 1rem; height: 52px; display: flex; align-items: center; gap: .6rem;
    border-bottom: 1px solid var(--border-soft); background: var(--panel);
  }
  header h1 { font-size: .95rem; margin: 0; font-weight: 650; letter-spacing: -.01em; }
  header .sub { color: var(--dim); font-size: .78rem; }
  #app { display: flex; height: calc(100vh - 52px); }

  /* ---- Sidebar ---- */
  #sidebar {
    width: 272px; flex: none; background: var(--panel);
    border-right: 1px solid var(--border-soft);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .section { padding: .6rem .8rem; border-bottom: 1px solid var(--border-soft); }
  .section:last-child { border-bottom: 0; }
  .section h3 {
    margin: 0 0 .35rem .25rem; font-size: .66rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .09em; color: var(--dim);
  }
  .addrow { display: flex; gap: .35rem; }
  .addrow input { flex: 1; min-width: 0; padding: .35rem .55rem; font-size: .82rem; }
  .addrow button { padding: .35rem .7rem; font-size: .8rem; }

  /* Sidebar rows (friends + groups) */
  .row {
    display: flex; align-items: center; gap: .6rem;
    padding: .45rem .5rem; border-radius: var(--radius);
    cursor: pointer; position: relative;
    transition: background .12s ease;
  }
  .row:hover { background: var(--surface); }
  .row.active { background: var(--surface-2); box-shadow: inset 2px 0 0 var(--accent); }
  .row .name { flex: 1; min-width: 0; font-size: .9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row.unread .name { font-weight: 650; color: #fff; }
  .row .rm { opacity: 0; transition: opacity .12s ease; }
  .row:hover .rm { opacity: 1; }

  /* Avatar */
  .avatar {
    width: 28px; height: 28px; flex: none; border-radius: 50%;
    display: grid; place-items: center;
    font-size: .72rem; font-weight: 650; color: #fff; letter-spacing: .02em;
  }
  .avatar.group { border-radius: 8px; background: var(--surface-2); color: var(--muted); }

  /* Presence dot — sits as a badge on the avatar's corner */
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #39404f; flex: none; }
  .dot.online { background: var(--online); }
  .avatar-wrap { position: relative; flex: none; display: block; line-height: 0; }
  .avatar-wrap .dot {
    position: absolute; right: -1px; bottom: -1px;
    width: 10px; height: 10px; border: 2px solid var(--panel); border-radius: 50%;
  }
  .row:hover .avatar-wrap .dot, .row.active .avatar-wrap .dot { border-color: var(--surface-2); }

  /* Unread pip */
  .pip {
    flex: none; min-width: 18px; height: 18px; padding: 0 5px;
    border-radius: 9px; background: var(--accent); color: #fff;
    font-size: .68rem; font-weight: 700; line-height: 18px; text-align: center;
  }
  .pip.dot-only { min-width: 8px; width: 8px; height: 8px; padding: 0; border-radius: 50%; }

  /* Requests */
  .req { display: flex; align-items: center; gap: .4rem; padding: .3rem .25rem; font-size: .88rem; }
  .req .name { flex: 1; }
  .req button { padding: .22rem .5rem; font-size: .75rem; }

  .empty-note { color: var(--dim); font-size: .8rem; padding: .5rem .25rem; }

  /* ---- Chat ---- */
  #chat { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  #chatHeader {
    height: 56px; flex: none; padding: 0 1rem; display: flex; align-items: center; gap: .55rem;
    border-bottom: 1px solid var(--border-soft); background: var(--panel);
  }
  #chatHeader .nick { font-weight: 600; font-size: .95rem; }
  #chatHeader .sub { color: var(--dim); font-size: .75rem; }

  #membersPanel {
    padding: .6rem 1rem; border-bottom: 1px solid var(--border-soft);
    display: flex; flex-wrap: wrap; gap: .4rem; background: #0e1117;
  }
  .chip {
    display: flex; align-items: center; gap: .35rem;
    background: var(--surface); border: 1px solid var(--border);
    padding: .2rem .55rem; border-radius: 999px; font-size: .78rem;
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 1.25rem 1rem;
    display: flex; flex-direction: column; gap: .35rem;
  }
  .msg {
    max-width: min(68%, 560px); padding: .5rem .75rem;
    border-radius: 14px; background: var(--surface);
    align-self: flex-start; word-wrap: break-word; overflow-wrap: anywhere;
    border-bottom-left-radius: 5px;
  }
  .msg.me {
    align-self: flex-end; background: var(--accent-dim);
    border-bottom-left-radius: 14px; border-bottom-right-radius: 5px;
  }
  .msg .sender { font-size: .7rem; font-weight: 650; color: var(--accent); margin-bottom: .15rem; }
  .msg .body p { margin: 0; }
  .msg .body p + p { margin-top: .4rem; }
  .msg .body code {
    background: rgba(0,0,0,.35); padding: .08rem .32rem; border-radius: 5px;
    font-family: ui-monospace, SFMono-Regular, monospace; font-size: .85em;
  }
  .msg .body a { color: #9dc0ff; }
  .msg img.thumb {
    max-width: 260px; max-height: 240px; border-radius: 10px;
    margin-top: .35rem; display: block; cursor: zoom-in;
    transition: opacity .15s ease;
  }
  .msg img.thumb:hover { opacity: .9; }
  /* Timestamp: tucked to the right, and only fully visible on hover so it
     doesn't compete with the message text. */
  .msg .time {
    font-size: .63rem; color: var(--dim); text-align: right;
    margin-top: .1rem; opacity: .55; transition: opacity .15s ease;
  }
  .msg:hover .time { opacity: 1; }
  .callmsg button { margin-top: .35rem; }

  #empty {
    flex: 1; display: flex; flex-direction: column; gap: .4rem;
    align-items: center; justify-content: center; color: var(--dim);
  }
  #empty .big { font-size: 2rem; opacity: .5; }

  #composer {
    flex: none; border-top: 1px solid var(--border-soft); background: var(--panel);
    padding: .6rem .8rem; display: flex; gap: .45rem; align-items: center;
  }
  #composer input[type=text] { flex: 1; border-radius: 999px; padding: .55rem .9rem; }
  #composer button { border-radius: 999px; }
  #composer .icon { padding: .45rem .6rem; font-size: 1rem; }

  #log { position: fixed; bottom: .4rem; left: .8rem; font-size: .72rem; color: var(--dim); }

  /* ---- Small screens ---- */
  @media (max-width: 720px) {
    #sidebar { width: 100%; position: absolute; inset: 52px 0 0 0; z-index: 5; }
    #sidebar.tucked { display: none; }
    .msg { max-width: 85%; }
  }
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth">
  <div class="card">
    <div class="brand">take-back</div>
    <h2 id="authTitle">Sign in to continue</h2>
    <input id="authNick" placeholder="nickname" autocomplete="username">
    <input id="authPass" type="password" placeholder="password" autocomplete="current-password">
    <div class="err" id="authErr"></div>
    <button id="authBtn" style="width:100%;">Log in</button>
    <div class="toggle" id="authToggle">No account? <a>Register</a></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="main" class="hidden">
  <header>
    <h1>take-back</h1>
    <span class="sub" id="verLabel"></span>
    <span style="flex:1;"></span>
    <span class="sub hidden" id="staleWarn" style="color:var(--danger);cursor:pointer;"
          title="Reload to get the current version">⚠ update available — reload</span>
    <span class="sub">signed in as <b id="meNick"></b></span>
    <button class="secondary" id="logoutBtn">Log out</button>
  </header>

  <div id="app">
    <aside id="sidebar">
      <div class="section">
        <h3>Add friend</h3>
        <div class="addrow">
          <input id="addNick" placeholder="their nickname" autocomplete="off">
          <button id="addBtn">Add</button>
        </div>
        <div class="err" id="addErr" style="color:#f87171;font-size:.75rem;"></div>
      </div>
      <div class="section">
        <h3>Groups</h3>
        <div class="addrow">
          <input id="groupName" placeholder="new group name" autocomplete="off">
          <button id="newGroupBtn">Create</button>
        </div>
        <div id="groups" style="margin-top:.4rem;"></div>
      </div>
      <div class="section hidden" id="requestsSection">
        <h3>Requests</h3>
        <div id="requests"></div>
      </div>
      <div class="section" style="flex:1;">
        <h3>Friends</h3>
        <div id="friends"></div>
      </div>
    </aside>

    <section id="chat">
      <div id="empty">
        <div class="big">✳</div>
        <div>Pick a conversation to start chatting.</div>
      </div>
      <div id="chatPane" class="hidden" style="flex:1; display:flex; flex-direction:column; min-height:0;">
        <div id="chatHeader">
          <span id="chatAvatar"></span>
          <span class="nick" id="chatNick"></span>
          <span class="sub" id="chatSub" style="color:#8b93a7;font-size:.75rem;"></span>
          <span style="flex:1;"></span>
          <button class="secondary hidden" id="membersBtn">👥 Members</button>
          <button class="secondary" id="callBtn">📹 Video call</button>
        </div>
        <div id="membersPanel" class="hidden" style="padding:.5rem 1rem;border-bottom:1px solid #262a33;display:flex;flex-wrap:wrap;gap:.5rem;"></div>
        <div id="messages"></div>
        <div id="composer">
          <button class="secondary icon" id="imgBtn" title="Send image">🖼</button>
          <input type="file" id="imgInput" accept="image/*" class="hidden">
          <input type="text" id="msgInput" placeholder="Message — markdown supported" autocomplete="off">
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
// Wire-protocol version this client speaks. Must match the server's MAJOR /
// protocol; see internal/version. Bump only alongside a breaking API change.
const CLIENT_PROTOCOL = 1;

const $ = (id) => document.getElementById(id);
async function api(path, opts = {}) {
  const res = await fetch(path, { credentials: "same-origin", ...opts });
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || res.statusText);
  return res.status === 204 ? null : res.json();
}

let me = null;
let openFriend = null;       // { id, nick, online } when a DM is open
let openGroup = null;        // { id, name, callCode } when a group is open
let events = null;           // events WebSocket
const friendState = new Map(); // id -> friend view
const groupState = new Map();   // id -> group
const groupMembers = new Map(); // userId -> { nick, online } for the open group

// ---------- Auth ----------
let registerMode = false;
$("authToggle").onclick = () => {
  registerMode = !registerMode;
  $("authTitle").textContent = registerMode ? "Create a take-back account" : "Log in to take-back";
  $("authBtn").textContent = registerMode ? "Register" : "Log in";
  $("authToggle").innerHTML = registerMode
    ? 'Have an account? <a>Log in</a>' : 'No account? <a>Register</a>';
  $("authToggle").querySelector("a").onclick = $("authToggle").onclick;
};
$("authBtn").onclick = async () => {
  $("authErr").textContent = "";
  const nick = $("authNick").value.trim(), password = $("authPass").value;
  try {
    me = await api(registerMode ? "/api/register" : "/api/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nick, password }),
    });
    enterApp();
  } catch (e) { $("authErr").textContent = e.message; }
};
$("authPass").addEventListener("keydown", (e) => { if (e.key === "Enter") $("authBtn").click(); });

$("logoutBtn").onclick = async () => {
  await api("/api/logout", { method: "POST" }).catch(() => {});
  events?.close();
  location.reload();
};

// ---------- App bootstrap ----------
async function enterApp() {
  $("auth").classList.add("hidden");
  $("main").classList.remove("hidden");
  $("meNick").textContent = me.nick;
  requestNotifyPermission();
  await loadFriends();
  await loadGroups();
  connectEvents();
}

// ---------- Groups ----------
$("newGroupBtn").onclick = async () => {
  const name = $("groupName").value.trim();
  if (!name) return;
  const g = await api("/api/groups", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name }),
  });
  $("groupName").value = "";
  await loadGroups();
  openGroupChat(g);
};

async function loadGroups() {
  const list = await api("/api/groups");
  groupState.clear();
  list.forEach((g) => groupState.set(g.id, g));
  renderGroups();
}

function renderGroups() {
  const box = $("groups");
  box.innerHTML = "";
  if (groupState.size === 0) {
    box.innerHTML = `<div class="empty-note">No groups yet.</div>`;
    return;
  }
  for (const g of [...groupState.values()].sort(byRecency((g) => g.name))) {
    const row = document.createElement("div");
    row.className = "row"
      + (openGroup && openGroup.id === g.id ? " active" : "")
      + (g.unread > 0 ? " unread" : "");
    row.append(avatar(g.name, true));

    const name = document.createElement("span");
    name.className = "name";
    name.textContent = g.name;
    row.append(name);

    if (g.unread > 0) {
      row.append(pip(g.unread));
    } else {
      const count = document.createElement("span");
      count.style.cssText = "color:var(--dim);font-size:.72rem;";
      count.textContent = g.memberCount;
      row.append(count);
    }
    row.onclick = () => openGroupChat(g);
    box.append(row);
  }
}

async function openGroupChat(g) {
  openFriend = null;
  openGroup = { id: g.id, name: g.name, callCode: g.callCode };
  $("empty").classList.add("hidden");
  $("chatPane").classList.remove("hidden");
  setChatAvatar(g.name, true);
  $("chatNick").textContent = g.name;
  $("membersBtn").classList.remove("hidden");
  $("membersPanel").classList.add("hidden");
  renderGroups();
  renderFriends();
  await loadMembers(g.id);
  const msgs = await api(`/api/groups/messages?group=${g.id}`);
  $("messages").innerHTML = "";
  msgs.forEach(appendMessage);
  scrollMessages();
  markRead("group", g.id, msgs);
}

async function loadMembers(groupId) {
  const members = await api(`/api/groups/members?group=${groupId}`);
  groupMembers.clear();
  members.forEach((m) => groupMembers.set(m.id, { nick: m.nick, online: m.online, owner: m.owner }));
  $("chatSub").textContent = members.length + " members";
  renderMembersPanel();
}

function renderMembersPanel() {
  const panel = $("membersPanel");
  panel.innerHTML = "";
  for (const [id, m] of groupMembers) {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.innerHTML = `<span class="dot ${m.online ? "online" : ""}"></span>${esc(m.nick)}${m.owner ? " ★" : ""}${id === me.id ? " (you)" : ""}`;
    panel.append(chip);
  }
  const add = document.createElement("span");
  add.style.cssText = "display:flex;gap:.3rem;align-items:center;";
  add.innerHTML = `<input id="addMemberNick" placeholder="add by nick" style="width:130px;padding:.2rem .5rem;font-size:.78rem;">`;
  const btn = mkBtn("+", "", async () => {
    const nick = $("addMemberNick").value.trim();
    if (!nick) return;
    try { await api("/api/groups/add", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ group: openGroup.id, nick }) });
      await loadMembers(openGroup.id); await loadGroups();
    } catch (e) { alert(e.message); }
  });
  btn.style.padding = ".2rem .5rem";
  add.append(btn);
  panel.append(add);
}

$("membersBtn").onclick = () => $("membersPanel").classList.toggle("hidden");

// ---------- Desktop (tray) notifications ----------
function requestNotifyPermission() {
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
}
// notify shows an OS notification when permitted and the page isn't focused.
// Clicking it focuses the tab (and optionally runs onClick).
function notify(title, body, onClick) {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  if (document.visibilityState === "visible" && document.hasFocus()) return;
  const n = new Notification(title, { body, tag: title });
  n.onclick = () => { window.focus(); n.close(); if (onClick) onClick(); };
}

// Try to resume an existing session on load, and check we're not a stale
// cached page talking to a newer server.
(async () => {
  checkVersion();
  try { me = await api("/api/me"); enterApp(); } catch { /* show auth */ }
})();

// checkVersion shows the server version, and warns if this page's protocol no
// longer matches it (i.e. a cached tab after a breaking deploy).
async function checkVersion() {
  try {
    const v = await api("/api/version");
    $("verLabel").textContent = "v" + v.version;
    if (v.protocol !== CLIENT_PROTOCOL) {
      $("staleWarn").classList.remove("hidden");
      $("staleWarn").onclick = () => location.reload(true);
    }
  } catch { /* offline; ignore */ }
}

// ---------- Friends ----------
$("addBtn").onclick = async () => {
  $("addErr").textContent = "";
  const nick = $("addNick").value.trim();
  if (!nick) return;
  try {
    await api("/api/friends/request", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nick }),
    });
    $("addNick").value = "";
    await loadFriends();
  } catch (e) { $("addErr").textContent = e.message; }
};

async function loadFriends() {
  const list = await api("/api/friends");
  friendState.clear();
  list.forEach((f) => friendState.set(f.user.id, f));
  renderFriends();
}

function renderFriends() {
  const requests = [], accepted = [];
  for (const f of friendState.values()) {
    if (f.status === "pending" && f.direction === "incoming") requests.push(f);
    else if (f.status === "accepted") accepted.push(f);
  }

  // Incoming requests
  const reqBox = $("requests");
  reqBox.innerHTML = "";
  $("requestsSection").classList.toggle("hidden", requests.length === 0);
  requests.forEach((f) => {
    const row = document.createElement("div");
    row.className = "req";
    row.append(avatar(f.user.nick));
    const name = document.createElement("span");
    name.className = "name";
    name.textContent = f.user.nick;
    row.append(name);
    row.append(mkBtn("Accept", "", () => respond(f.user.id, true)));
    row.append(mkBtn("Decline", "ghost", () => respond(f.user.id, false)));
    reqBox.append(row);
  });

  // Newest conversation first. Deliberately NOT sorted by unread or presence:
  // those change as you click (or as people come and go) and would make rows
  // jump around under the cursor. Never-messaged friends fall to the bottom,
  // alphabetically.
  const box = $("friends");
  box.innerHTML = "";
  accepted.sort(byRecency((f) => f.user.nick));
  accepted.forEach((f) => {
    const row = document.createElement("div");
    row.className = "row"
      + (openFriend && openFriend.id === f.user.id ? " active" : "")
      + (f.unread > 0 ? " unread" : "");
    row.append(avatarWrap(f.user.nick, false, f.online));

    const name = document.createElement("span");
    name.className = "name";
    name.textContent = f.user.nick;
    row.append(name);

    if (f.unread > 0) row.append(pip(f.unread));
    else {
      // This unfriends — a destructive, mutual action — so label it and confirm.
      // (There's no "close chat" here: the row *is* the friend, not a tab.)
      const rm = mkBtn("✕", "ghost", (e) => {
        e.stopPropagation();
        const ok = confirm(
          `Remove ${f.user.nick} as a friend?\n\n` +
          `You'll each disappear from the other's friends list and won't be able ` +
          `to message until you're friends again. Your history is kept.`);
        if (ok) removeFriend(f.user.id);
      });
      rm.classList.add("rm");
      rm.title = "Remove friend";
      row.append(rm);
    }
    row.onclick = () => openChat(f.user);
    box.append(row);
  });
  if (accepted.length === 0)
    box.innerHTML = `<div class="empty-note">No friends yet — add someone above.</div>`;
}

// byRecency sorts conversations newest-first, falling back to name for those
// with no messages yet. `nameOf` extracts the display name for that tiebreak.
function byRecency(nameOf) {
  return (a, b) =>
    (b.lastActivity || 0) - (a.lastActivity || 0) ||
    nameOf(a).localeCompare(nameOf(b));
}

// touchActivity bumps a conversation's last-activity so it moves to the top the
// moment a message is sent or received, without refetching the list.
function touchActivity(kind, id, created) {
  const state = kind === "dm" ? friendState.get(id) : groupState.get(id);
  if (!state) return;
  state.lastActivity = created || Math.floor(Date.now() / 1000);
  kind === "dm" ? renderFriends() : renderGroups();
}

// pip renders an unread badge (count, capped at 99+).
function pip(n) {
  const p = document.createElement("span");
  p.className = "pip";
  p.textContent = n > 99 ? "99+" : String(n);
  return p;
}

// setChatAvatar swaps the avatar shown in the chat header.
function setChatAvatar(name, isGroup, online) {
  $("chatAvatar").replaceChildren(avatarWrap(name, isGroup, online));
}

// avatarWrap is an avatar with an optional presence badge on its corner.
// Pass online=undefined (groups) to omit the badge.
function avatarWrap(name, isGroup, online) {
  const wrap = document.createElement("span");
  wrap.className = "avatar-wrap";
  wrap.append(avatar(name, isGroup));
  if (online !== undefined) {
    const d = document.createElement("span");
    d.className = "dot" + (online ? " online" : "");
    wrap.append(d);
  }
  return wrap;
}

// avatar renders a colour-from-nick initials circle.
function avatar(nick, isGroup) {
  const a = document.createElement("span");
  a.className = "avatar" + (isGroup ? " group" : "");
  if (isGroup) {
    a.textContent = "#";
  } else {
    a.textContent = (nick || "?").slice(0, 2).toUpperCase();
    let h = 0;
    for (let i = 0; i < nick.length; i++) h = (h * 31 + nick.charCodeAt(i)) >>> 0;
    a.style.background = `hsl(${h % 360} 55% 42%)`;
  }
  return a;
}

async function respond(userId, accept) {
  await api("/api/friends/respond", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ userId, accept }),
  });
  await loadFriends();
}
async function removeFriend(userId) {
  await api("/api/friends/remove", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ userId }),
  });
  if (openFriend && openFriend.id === userId) { openFriend = null; showEmpty(); }
  await loadFriends();
}

// ---------- Chat ----------
function showEmpty() { $("empty").classList.remove("hidden"); $("chatPane").classList.add("hidden"); }

async function openChat(user) {
  openFriend = { id: user.id, nick: user.nick };
  openGroup = null;
  $("empty").classList.add("hidden");
  $("chatPane").classList.remove("hidden");
  const f = friendState.get(user.id);
  setChatAvatar(user.nick, false, !!(f && f.online));
  $("chatNick").textContent = user.nick;
  $("chatSub").textContent = "";
  $("membersBtn").classList.add("hidden");
  $("membersPanel").classList.add("hidden");
  renderGroups();
  renderFriends();
  const msgs = await api(`/api/messages?with=${user.id}`);
  $("messages").innerHTML = "";
  msgs.forEach(appendMessage);
  scrollMessages();
  markRead("dm", user.id, msgs);
}

// markRead tells the server we've seen this conversation up to its newest
// message, and clears the local pip immediately.
async function markRead(kind, id, msgs) {
  const lastId = msgs && msgs.length ? msgs[msgs.length - 1].id : 0;
  const state = kind === "dm" ? friendState.get(id) : groupState.get(id);
  const hadUnread = state && state.unread > 0;
  if (state) state.unread = 0;
  if (hadUnread) { renderFriends(); renderGroups(); }
  if (!lastId) return;
  await api("/api/read", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ kind, id, lastId }),
  }).catch(() => {});
}

// bumpUnread increments the local pip for a conversation that isn't open.
function bumpUnread(kind, id) {
  const state = kind === "dm" ? friendState.get(id) : groupState.get(id);
  if (!state) return;
  state.unread = (state.unread || 0) + 1;
  kind === "dm" ? renderFriends() : renderGroups();
}

$("sendBtn").onclick = sendText;
$("msgInput").addEventListener("keydown", (e) => { if (e.key === "Enter") sendText(); });
async function sendText() {
  const body = $("msgInput").value.trim();
  if (!body) return;
  $("msgInput").value = "";
  let msg;
  if (openGroup) {
    msg = await api("/api/groups/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ group: openGroup.id, body }),
    });
  } else if (openFriend) {
    msg = await api("/api/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ with: openFriend.id, body }),
    });
  } else return;
  appendMessage(msg); scrollMessages();
  touchActivity(openGroup ? "group" : "dm", openGroup ? openGroup.id : openFriend.id, msg.created);
}

$("imgBtn").onclick = () => $("imgInput").click();
$("imgInput").onchange = async () => {
  const file = $("imgInput").files[0];
  if (!file) return;
  const form = new FormData();
  form.append("image", file);
  let msg;
  if (openGroup) {
    form.append("group", openGroup.id);
    msg = await api("/api/groups/messages/image", { method: "POST", body: form });
  } else if (openFriend) {
    form.append("with", openFriend.id);
    msg = await api("/api/messages/image", { method: "POST", body: form });
  } else return;
  appendMessage(msg); scrollMessages();
  touchActivity(openGroup ? "group" : "dm", openGroup ? openGroup.id : openFriend.id, msg.created);
  $("imgInput").value = "";
};

function appendMessage(m) {
  const div = document.createElement("div");
  const mine = m.senderId === me.id;
  div.className = "msg" + (mine ? " me" : "");

  // Build the whole bubble in one string — assigning innerHTML later would
  // wipe out anything appended beforehand (e.g. the group sender label).
  let html = "";
  if (openGroup && !mine) {
    const who = groupMembers.get(m.senderId);
    if (who) html += `<div class="sender">${esc(who.nick)}</div>`;
  }

  const call = m.body && m.body.match(/^📞 call:([A-Z0-9]{4,8})$/);
  if (call) {
    div.classList.add("callmsg");
    html += `<div class="body">📞 Video call</div>`;
    div.innerHTML = html;
    div.append(mkBtn("Join call " + call[1], "", () => joinCall(call[1])));
  } else {
    if (m.body) html += `<div class="body">${renderMarkdown(m.body)}</div>`;
    if (m.thumbUrl) html += `<a href="${m.imageUrl}" target="_blank" rel="noopener">
      <img class="thumb" src="${m.thumbUrl}" alt="image"></a>`;
    div.innerHTML = html;
  }

  const t = document.createElement("div");
  t.className = "time";
  t.textContent = new Date(m.created * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  div.append(t);
  $("messages").append(div);
}
function scrollMessages() { const m = $("messages"); m.scrollTop = m.scrollHeight; }

// ---------- Calls ----------
$("callBtn").onclick = async () => {
  if (openGroup) {
    // Group calls use the group's stable call code; announce it in the chat.
    const code = openGroup.callCode;
    await api("/api/groups/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ group: openGroup.id, body: "📞 call:" + code }),
    }).then(appendMessage);
    scrollMessages();
    joinCall(code);
  } else if (openFriend) {
    const code = randomCode();
    await api("/api/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ with: openFriend.id, body: "📞 call:" + code }),
    }).then(appendMessage);
    scrollMessages();
    joinCall(code);
  }
};
function joinCall(code) {
  window.open(`/call.html?room=${encodeURIComponent(code)}&nick=${encodeURIComponent(me.nick)}`, "_blank");
}
function randomCode() {
  const a = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  return Array.from({ length: 6 }, () => a[Math.floor(Math.random() * a.length)]).join("");
}

// ---------- Live events ----------
function connectEvents() {
  const url = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host + "/api/events";
  events = new WebSocket(url);
  events.onmessage = (ev) => {
    const e = JSON.parse(ev.data);
    if (e.type === "presence") {
      const f = friendState.get(e.userId);
      if (f) { f.online = e.online; renderFriends();
        if (openFriend && openFriend.id === e.userId) setChatAvatar(openFriend.nick, false, e.online); }
      // Update the open group's member roster dot too.
      const gm = groupMembers.get(e.userId);
      if (gm) { gm.online = e.online; if (openGroup) renderMembersPanel(); }
    } else if (e.type === "hello") {
      (e.onlineFriends || []).forEach((id) => { const f = friendState.get(id); if (f) f.online = true; });
      renderFriends();
    } else if (e.type === "message") {
      const m = e.message;
      touchActivity("dm", m.senderId, m.created); // move the conversation to the top
      if (openFriend && m.senderId === openFriend.id) {
        appendMessage(m); scrollMessages();
        markRead("dm", openFriend.id, [m]); // keep it read while we're looking
      } else {
        // Message from someone whose chat isn't open — pip it and notify.
        bumpUnread("dm", m.senderId);
        const from = friendState.get(m.senderId);
        const who = from ? from.user.nick : "someone";
        const preview = m.body ? m.body.slice(0, 80) : "📷 image";
        notify("Message from " + who, preview, () => { if (from) openChat(from.user); });
      }
    } else if (e.type === "friend_request") {
      // A new incoming friend request: refresh the list and raise a notification.
      loadFriends();
      notify("Friend request", e.nick + " wants to be your friend");
    } else if (e.type === "friend_update") {
      // A request we sent was accepted/declined, or a friend removed us.
      loadFriends();
    } else if (e.type === "group_message") {
      const m = e.message;
      touchActivity("group", m.groupId, m.created);
      if (openGroup && m.groupId === openGroup.id) {
        appendMessage(m); scrollMessages();
        markRead("group", openGroup.id, [m]);
      } else {
        bumpUnread("group", m.groupId);
        const g = groupState.get(m.groupId);
        const preview = m.body ? m.body.slice(0, 80) : "📷 image";
        notify("Message in " + (g ? g.name : "a group"), preview);
      }
    } else if (e.type === "group_update") {
      // Roster/membership changed (userId carries the group id here).
      loadGroups();
      if (openGroup && e.userId === openGroup.id) loadMembers(openGroup.id);
    }
  };
  events.onclose = () => setTimeout(() => { if (me) connectEvents(); }, 2000);
}

// ---------- Helpers ----------
function mkBtn(label, cls, onclick) {
  const b = document.createElement("button");
  b.textContent = label; if (cls) b.className = cls; b.onclick = onclick; return b;
}
function esc(s) {
  return s.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
// Minimal, safe Markdown: escape first, then apply a small set of inline rules.
function renderMarkdown(src) {
  let s = esc(src);
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
  // Links [text](http/https url) only.
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\n/g, "<br>");
  return "<p>" + s + "</p>";
}
</script>
