<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>take-back</title>
<style>
  :root {
    color-scheme: dark;
    --bg:        #0b0d11;
    --panel:     #11141b;
    --surface:   #171b24;
    --surface-2: #1e2431;
    --border:    #232936;
    --border-soft: #1a1f29;
    --text:      #e8eaf0;
    --muted:     #8a93a6;
    --dim:       #5a6273;
    --accent:    #5b8cff;
    --online:    #22c55e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 15px; background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 0 1rem; height: 52px; display:flex; align-items:center; gap:.6rem;
    border-bottom: 1px solid var(--border-soft); background: var(--panel);
  }
  header h1 { font-size:.95rem; margin:0; font-weight:650; letter-spacing:-.01em; }
  header .sub { color: var(--dim); font-size:.78rem; }
  main { padding: 1.25rem; max-width: 1100px; margin: 0 auto; }
  .card {
    background: var(--panel); border:1px solid var(--border);
    border-radius:14px; padding:1.25rem; margin-bottom:1rem;
  }
  label { display:block; font-size:.8rem; color: var(--muted); margin-bottom:.35rem; }
  input {
    width:100%; padding:.5rem .7rem; border-radius:10px; border:1px solid var(--border);
    background:#0d1016; color: var(--text); font-size:.95rem;
  }
  input::placeholder { color: var(--dim); }
  input:focus { border-color:#2f4a8f; outline:none; }
  button {
    padding:.5rem .85rem; border-radius:10px; border:1px solid transparent; font-size:.875rem;
    cursor:pointer; background: var(--accent); color:#fff; font-weight:550;
    transition: background .15s ease;
  }
  button:hover { background:#6f9bff; }
  button.secondary { background: var(--surface-2); color: var(--text); border-color: var(--border); }
  button.secondary:hover { background:#262d3c; }
  button:disabled { opacity:.45; cursor:not-allowed; }
  button:focus-visible, input:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .hidden { display:none !important; }
  .callbar { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
  .code {
    font-family: ui-monospace, SFMono-Regular, monospace; font-size:1.15rem; letter-spacing:.18em;
    background:#0d1016; padding:.3rem .7rem; border-radius:10px; border:1px solid var(--border);
  }
  .row { display:flex; gap:.75rem; flex-wrap:wrap; align-items:flex-end; }
  .row > div { flex:1; min-width:180px; }
  #grid { display:grid; gap:.75rem; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); margin-top:1rem; }
  .tile {
    position:relative; background:#000; border-radius:12px; overflow:hidden; aspect-ratio:4/3;
    outline:2px solid transparent; outline-offset:-2px;
    transition:outline-color .12s ease;
  }
  .tile video {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  }
  /* "Flip my video": mirror only your own preview, like a real mirror. */
  .tile.mirror video { transform: scaleX(-1); }

  /* Voice-only (camera off): show the profile picture over the video.
     NB: the video element stays rendered (opacity:0, not display:none) — a
     display:none media element can have its playback torn down by the browser,
     and we still need the peer's AUDIO in voice-only mode. */
  .tile.novideo video { opacity:0; }
  .tile .avatar {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    display:none;
  }
  .tile.novideo .avatar {
    display:grid; place-items:center;
    width:96px; height:96px; border-radius:50%;
    font-size:2rem; font-weight:650; color:#fff; letter-spacing:.02em;
    border:3px solid transparent;
    transition:border-color .12s ease, box-shadow .12s ease;
  }

  /* Speaking indicator: a green ring. Around the avatar in voice-only mode,
     around the whole tile when video is on. */
  .tile.speaking { outline-color:#22c55e; }
  .tile.novideo.speaking { outline-color:transparent; }
  .tile.novideo.speaking .avatar {
    border-color:#22c55e; box-shadow:0 0 14px rgba(34,197,94,.55);
  }
  /* Muted mic beats speaking: never imply we're transmitting when we aren't. */
  .tile.muted .avatar { border-color:transparent; box-shadow:none; }
  .tile.muted { outline-color:transparent; }
  .tile .micoff {
    position:absolute; right:.5rem; top:.5rem; font-size:.9rem;
    background:rgba(0,0,0,.55); border-radius:6px; padding:.1rem .35rem; display:none;
  }
  .tile.muted .micoff { display:block; }
  .tile .name {
    position:absolute; left:.5rem; bottom:.5rem; background:rgba(0,0,0,.6);
    padding:.15rem .5rem; border-radius:6px; font-size:.78rem;
  }
  .status { font-size:.8rem; color: var(--dim); }
  .pill { font-size:.72rem; padding:.15rem .55rem; border-radius:999px; background:rgba(34,197,94,.13); color:#4ade80; }
</style>
</head>
<body>
<header>
  <h1>take-back</h1>
  <span class="sub">webrtc nat-passthrough prototype</span>
</header>
<main>

  <!-- Step 1: nickname -->
  <section id="nickStep" class="card">
    <label for="nick">Enter a nickname to get started</label>
    <div class="row">
      <div><input id="nick" placeholder="e.g. river" autocomplete="off"></div>
      <button id="nickBtn">Continue</button>
    </div>
  </section>

  <!-- Step 2: host or join -->
  <section id="lobbyStep" class="card hidden">
    <div class="callbar" style="margin-bottom:1rem;">
      <span class="status">Hi <b id="nickLabel"></b> — start or join a call.</span>
    </div>
    <div class="row">
      <div>
        <button id="hostBtn">Host a new call</button>
      </div>
      <div>
        <label for="joinCode">Join with a call code</label>
        <input id="joinCode" placeholder="ABCD12" autocomplete="off" style="text-transform:uppercase;">
      </div>
      <div style="flex:0;">
        <button id="joinBtn" class="secondary">Join</button>
      </div>
    </div>
  </section>

  <!-- Step 3: in call -->
  <section id="callStep" class="card hidden">
    <div class="callbar">
      <span class="status">Call code:</span>
      <span class="code" id="callCode"></span>
      <button id="copyBtn" class="secondary">Copy</button>
      <span class="pill" id="connPill">connecting…</span>
      <span class="pill hidden" id="signalWarn" style="background:rgba(248,113,113,.13);color:#f87171;"
            title="The call keeps running; new peers can't join until this recovers">⚠ signaling</span>
      <span style="flex:1;"></span>
      <button id="audioGate" class="hidden">🔊 Enable audio</button>
      <button id="micBtn" class="secondary">🎤 Mic on</button>
      <button id="camBtn" class="secondary">📷 Camera on</button>
      <button id="flipBtn" class="secondary" title="Mirror your own video">🔁 Flip mine</button>
      <button id="shareBtn" class="secondary">Share screen</button>
      <button id="leaveBtn" class="secondary">Leave</button>
    </div>
    <div id="grid"></div>
  </section>

  <p class="status" id="log"></p>
</main>

<script>
// Signaling is proxied same-origin by the web app, so derive it from the page.
const SIGNAL_URL = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host + "/ws";
// Public STUN so peers can discover their NAT-mapped address. Add TURN here for
// networks where a direct path can't be punched.
const ICE_CONFIG = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

let nick = "";
let ws = null;
let myId = null;
let roomCode = "";
let localStream = null;    // what we send to peers (camera or screen)
let cameraStream = null;   // the original camera+mic, kept so we can revert
let screenStream = null;   // active screen capture, if any
const peers = new Map(); // peerId -> { pc, nick }

const $ = (id) => document.getElementById(id);
const logEl = $("log");
function log(msg) { logEl.textContent = msg; console.log("[take-back]", msg); }

// ---- Step 1: nickname ----
$("nickBtn").onclick = () => {
  const v = $("nick").value.trim();
  if (!v) return;
  nick = v;
  $("nickLabel").textContent = nick;
  $("nickStep").classList.add("hidden");
  $("lobbyStep").classList.remove("hidden");
};
$("nick").addEventListener("keydown", (e) => { if (e.key === "Enter") $("nickBtn").click(); });

// ---- Step 2: host / join ----
function randomCode() {
  const alphabet = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 6; i++) s += alphabet[Math.floor(Math.random() * alphabet.length)];
  return s;
}
$("hostBtn").onclick = () => startCall(randomCode());
$("joinBtn").onclick = () => {
  const c = $("joinCode").value.trim().toUpperCase();
  if (c) startCall(c);
};

// ---- Step 3: the call ----
async function startCall(code) {
  roomCode = code;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    cameraStream = localStream;
  } catch (err) {
    log("Could not access camera/microphone: " + err.message);
    return;
  }
  $("lobbyStep").classList.add("hidden");
  $("callStep").classList.remove("hidden");
  $("callCode").textContent = code;
  addTile("local", nick + " (you)", localStream, true);
  connectSignaling();
}

$("copyBtn").onclick = () => {
  navigator.clipboard.writeText(roomCode).then(() => log("Call code copied."));
};
$("leaveBtn").onclick = () => { leaving = true; location.reload(); };

// ---- Flip my own video ----
// Mirrors only your own preview (what you're used to seeing in a mirror); what
// peers receive is untouched.
let mirrored = true; // self-view starts mirrored, like most video apps
$("flipBtn").onclick = () => {
  mirrored = !mirrored;
  applyMirror();
};
function applyMirror() {
  const tile = document.getElementById("tile-local");
  if (tile) tile.classList.toggle("mirror", mirrored);
}

// ---- Audio recovery ----
// Browsers can block autoplay-with-sound and suspend the AudioContext (which
// would also silently kill the speaking rings). One tap fixes both.
$("audioGate").onclick = async () => {
  if (audioCtx && audioCtx.state === "suspended") await audioCtx.resume();
  document.querySelectorAll("#grid video").forEach((v) => v.play().catch(() => {}));
  $("audioGate").classList.add("hidden");
  log("Audio enabled.");
};
// Any click is a user gesture: opportunistically un-suspend.
document.addEventListener("click", () => {
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
});
// Coming back to the tab can leave the context suspended; the rings depend on it.
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && audioCtx && audioCtx.state === "suspended") audioCtx.resume();
});

// ---- Mic / camera toggles ----
// Toggling only flips track.enabled, so the sender/track stays put and no
// renegotiation is needed. Peers are told over signaling so they can swap to
// the profile picture — a disabled video track just sends black frames, which
// they'd otherwise render as a black tile.
let micOn = true, camOn = true;
const peerState = new Map(); // peerId -> { video, audio }

$("micBtn").onclick = () => {
  micOn = !micOn;
  cameraStream.getAudioTracks().forEach((t) => (t.enabled = micOn));
  $("micBtn").textContent = micOn ? "🎤 Mic on" : "🔇 Mic off";
  setTileMuted("local", !micOn);
  broadcastState();
};

$("camBtn").onclick = () => {
  camOn = !camOn;
  // Don't clobber an active screen share with the camera toggle.
  if (!screenStream) cameraStream.getVideoTracks().forEach((t) => (t.enabled = camOn));
  $("camBtn").textContent = camOn ? "📷 Camera on" : "📷 Camera off";
  setTileVideo("local", camOn || !!screenStream);
  broadcastState();
};

function broadcastState() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  send({ type: "state", payload: JSON.stringify({ video: camOn || !!screenStream, audio: micOn }) });
}

function applyState(id, s) {
  setTileVideo(id, !!s.video);
  setTileMuted(id, !s.audio);
}

// ---- Screen sharing ----
// Swaps the outgoing video track on every peer connection via replaceTrack, so
// no SDP renegotiation is needed. Audio keeps flowing from the mic throughout.
$("shareBtn").onclick = () => (screenStream ? stopScreenShare() : startScreenShare());

async function startScreenShare() {
  let capture;
  try {
    capture = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
  } catch (err) {
    log("Screen share cancelled: " + err.message);
    return;
  }
  screenStream = capture;
  const screenTrack = capture.getVideoTracks()[0];
  replaceOutgoingVideo(screenTrack);

  // Reflect it in our own preview (screen video + existing mic audio).
  const preview = new MediaStream([screenTrack, ...cameraStream.getAudioTracks()]);
  localStream = preview;
  addTile("local", nick + " (you, sharing)", preview, true);

  // The browser's native "Stop sharing" bar ends the track directly.
  screenTrack.onended = stopScreenShare;
  $("shareBtn").textContent = "Stop sharing";
  log("Sharing your screen.");
}

function stopScreenShare() {
  if (!screenStream) return;
  screenStream.getTracks().forEach((t) => t.stop());
  screenStream = null;

  const camTrack = cameraStream.getVideoTracks()[0];
  replaceOutgoingVideo(camTrack);
  localStream = cameraStream;
  addTile("local", nick + " (you)", cameraStream, true);
  $("shareBtn").textContent = "Share screen";
  log("Stopped sharing; back to camera.");
}

// replaceOutgoingVideo points every peer's video sender at `track`.
function replaceOutgoingVideo(track) {
  for (const { pc } of peers.values()) {
    const sender = pc.getSenders().find((s) => s.track && s.track.kind === "video");
    if (sender) sender.replaceTrack(track);
  }
}

let leaving = false;
let reconnectTimer = null;
let reconnectDelay = 1000;

function connectSignaling() {
  const url = SIGNAL_URL + "?room=" + encodeURIComponent(roomCode) + "&nick=" + encodeURIComponent(nick);
  ws = new WebSocket(url);

  ws.onopen = () => {
    reconnectDelay = 1000;
    setSignalOK(true);
    log("Connected to signaling.");
  };
  ws.onclose = () => {
    // The call itself keeps working (media is peer-to-peer), so don't claim the
    // call dropped — just flag signaling and get the socket back, otherwise the
    // server drops us from the room and nobody can re-negotiate with us.
    setSignalOK(false);
    if (!leaving) scheduleReconnect();
  };
  ws.onerror = () => setSignalOK(false);
  ws.onmessage = (ev) => handleSignal(JSON.parse(ev.data));
}

function scheduleReconnect() {
  clearTimeout(reconnectTimer);
  log("Signaling lost — reconnecting…");
  reconnectTimer = setTimeout(() => {
    // A reconnect gets us a fresh peer id, so drop the old peer connections and
    // renegotiate from scratch rather than ending up with duplicates.
    resetPeers();
    connectSignaling();
  }, reconnectDelay);
  reconnectDelay = Math.min(reconnectDelay * 2, 15000);
}

function resetPeers() {
  for (const [id, entry] of peers) {
    entry.pc.close();
    const tile = document.getElementById("tile-" + id);
    if (tile) tile.remove();
  }
  peers.clear();
  peerState.clear();
  updateCallPill();
}

// ---- Status ----
// The pill reflects the CALL (peer connections), not the signaling socket: they
// are independent, and a dropped signaling socket used to make a perfectly good
// call read as "disconnected".
function updateCallPill() {
  const states = [...peers.values()].map((p) => p.pc.connectionState);
  const pill = $("connPill");
  if (states.some((s) => s === "connected")) {
    pill.textContent = "connected";
    pill.style.color = ""; pill.style.background = "";
  } else if (peers.size > 0) {
    pill.textContent = "connecting…";
  } else {
    pill.textContent = "waiting for others";
  }
}

// Signaling trouble is shown separately and quietly — it doesn't mean the call
// is down, but it does mean new peers can't join until it recovers.
function setSignalOK(ok) {
  const el = $("signalWarn");
  if (el) el.classList.toggle("hidden", ok);
}

function send(obj) { ws.send(JSON.stringify(obj)); }

async function handleSignal(msg) {
  switch (msg.type) {
    case "welcome":
      myId = msg.to;
      broadcastState(); // let the room know our initial mic/camera state
      // We are the newcomer: initiate an offer to each existing peer.
      for (const p of msg.peers || []) {
        await createPeer(p.id, p.nick, true);
      }
      updateCallPill();
      break;
    case "hello":
      // An existing peer sees a newcomer; wait for their offer. Re-announce our
      // mic/camera state so the newcomer renders us correctly from the start.
      broadcastState();
      break;
    case "state": {
      // A peer's mic/camera changed (or they just told us their initial state).
      const s = JSON.parse(msg.payload);
      peerState.set(msg.from, s);
      applyState(msg.from, s);
      break;
    }
    case "offer": {
      const pc = await createPeer(msg.from, msg.nick, false);
      await pc.setRemoteDescription(JSON.parse(msg.payload));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      send({ type: "answer", to: msg.from, nick, payload: JSON.stringify(answer) });
      break;
    }
    case "answer": {
      const entry = peers.get(msg.from);
      if (entry) await entry.pc.setRemoteDescription(JSON.parse(msg.payload));
      break;
    }
    case "candidate": {
      const entry = peers.get(msg.from);
      if (entry && msg.payload) {
        try { await entry.pc.addIceCandidate(JSON.parse(msg.payload)); }
        catch (e) { console.warn("addIceCandidate", e); }
      }
      break;
    }
    case "leave":
      removePeer(msg.from);
      break;
  }
}

async function createPeer(peerId, peerNick, initiator) {
  let entry = peers.get(peerId);
  if (entry) return entry.pc;

  const pc = new RTCPeerConnection(ICE_CONFIG);
  entry = { pc, nick: peerNick || "peer" };
  peers.set(peerId, entry);

  localStream.getTracks().forEach((t) => pc.addTrack(t, localStream));

  pc.onicecandidate = (e) => {
    if (e.candidate) send({ type: "candidate", to: peerId, payload: JSON.stringify(e.candidate) });
  };
  pc.ontrack = (e) => {
    addTile(peerId, entry.nick, e.streams[0], false);
    updateCallPill();
  };
  pc.onconnectionstatechange = () => {
    log("peer " + peerId + ": " + pc.connectionState);
    updateCallPill();
    if (pc.connectionState === "failed" || pc.connectionState === "closed") removePeer(peerId);
  };

  if (initiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    send({ type: "offer", to: peerId, nick, payload: JSON.stringify(offer) });
  }
  return pc;
}

function removePeer(peerId) {
  const entry = peers.get(peerId);
  if (entry) { entry.pc.close(); peers.delete(peerId); }
  const tile = document.getElementById("tile-" + peerId);
  if (tile) tile.remove();
  updateCallPill();
}

// Bootstrap: if opened as call.html?room=CODE&nick=NAME (e.g. launched from the
// chat app), skip the nickname/lobby steps and join straight away.
(function autostart() {
  const params = new URLSearchParams(location.search);
  const room = params.get("room");
  const who = params.get("nick");
  if (room && who) {
    nick = who;
    $("nickStep").classList.add("hidden");
    $("lobbyStep").classList.add("hidden");
    startCall(room.toUpperCase());
  }
})();

// ---- Speaking detection (voice activity) ----
// Each participant's audio is tapped with an AnalyserNode; when the short-term
// RMS crosses a threshold we ring their tile green. This doubles as a "is my mic
// actually picking me up?" check for yourself.
let audioCtx = null;
const vadAttached = new Set();

const SPEAK_ON = 0.035;   // RMS to start showing as speaking
const SPEAK_OFF = 0.020;  // drop below this to stop (hysteresis avoids flicker)
const HANG_MS = 350;      // keep the ring this long after you stop talking

function attachVAD(tileId, stream) {
  if (vadAttached.has(tileId) || !stream.getAudioTracks().length) return;
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.4;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  vadAttached.add(tileId);

  const buf = new Uint8Array(analyser.fftSize);
  let speaking = false, quietSince = 0;

  function tick() {
    const tile = document.getElementById(tileId);
    if (!tile) return;

    analyser.getByteTimeDomainData(buf);
    let sum = 0;
    for (let i = 0; i < buf.length; i++) {
      const v = (buf[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / buf.length);
    const now = performance.now();

    if (!speaking && rms > SPEAK_ON) { speaking = true; quietSince = 0; }
    else if (speaking && rms < SPEAK_OFF) {
      if (!quietSince) quietSince = now;
      if (now - quietSince > HANG_MS) speaking = false;
    } else if (speaking) quietSince = 0;

    tile.classList.toggle("speaking", speaking);
  }

  // Deliberately setInterval, not requestAnimationFrame: rAF is paused entirely
  // in background tabs, which froze the ring mid-state until you looked back.
  const timer = setInterval(() => {
    if (!document.getElementById(tileId)) { // tile gone: stop polling
      clearInterval(timer);
      vadAttached.delete(tileId);
      return;
    }
    tick();
  }, 100);
}

// ---- Avatars (match the chat client's initials style) ----
function initialsOf(name) { return (name || "?").slice(0, 2).toUpperCase(); }
function colorFor(name) {
  let h = 0;
  for (let i = 0; i < (name || "").length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return `hsl(${h % 360} 55% 42%)`;
}

// setTileVideo toggles between the video feed and the profile picture.
function setTileVideo(id, on) {
  const tile = document.getElementById("tile-" + id);
  if (tile) tile.classList.toggle("novideo", !on);
}
function setTileMuted(id, isMuted) {
  const tile = document.getElementById("tile-" + id);
  if (tile) tile.classList.toggle("muted", isMuted);
}

function addTile(id, name, stream, muted) {
  let tile = document.getElementById("tile-" + id);
  if (!tile) {
    tile = document.createElement("div");
    tile.className = "tile";
    tile.id = "tile-" + id;
    const video = document.createElement("video");
    video.autoplay = true; video.playsInline = true; video.muted = muted;
    const av = document.createElement("div");
    av.className = "avatar";
    const mic = document.createElement("div");
    mic.className = "micoff";
    mic.textContent = "🔇";
    const label = document.createElement("div");
    label.className = "name";
    tile.append(video, av, mic, label);
    $("grid").append(tile);
  }
  const v = tile.querySelector("video");
  if (v.srcObject !== stream) v.srcObject = stream;
  // Autoplay with sound can be blocked (e.g. when the call auto-joins from a
  // chat link, with no click on this page). Silent failure here = "their audio
  // just doesn't work", so surface it and offer a one-tap fix.
  v.play().catch(() => { if (id !== "local") $("audioGate").classList.remove("hidden"); });
  tile.querySelector(".name").textContent = name;

  // Profile picture shown whenever the camera is off.
  const av = tile.querySelector(".avatar");
  av.textContent = initialsOf(baseNick(name));
  av.style.background = colorFor(baseNick(name));

  // Ring this tile when its owner speaks.
  attachVAD(tile.id, stream);

  // A peer's state may have arrived before their video track did.
  if (peerState.has(id)) applyState(id, peerState.get(id));
  if (id === "local") applyMirror();
}

// baseNick strips the decorations we add to labels ("river (you, sharing)").
function baseNick(label) { return (label || "").split(" (")[0]; }
</script>
</body>
