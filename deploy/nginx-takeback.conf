# nginx vhost for take-back.
# Origin sits behind Cloudflare (proxied). Cloudflare terminates TLS; this
# listens on :80 like the other chain-of-thought.org sites.
#
# NOTE: getUserMedia/Notifications require HTTPS at the browser — that is
# provided by Cloudflare. For the Cloudflare->origin leg, use SSL mode
# "Flexible" (matching the other sites) or add a 443 listener + origin cert
# and use "Full (strict)".

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;

    server_name takeback.chain-of-thought.org;

    # Allow image uploads (16 MB cap in the app; give headroom).
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # WebSocket upgrade for /ws and /api/events (proxied through cmd/web).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Keep long-lived signaling/events sockets alive.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
