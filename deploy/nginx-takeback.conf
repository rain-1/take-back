# nginx vhost for take-back.
# Origin sits behind Cloudflare (proxied). The browser always talks HTTPS to
# Cloudflare (required for getUserMedia/Notifications). This server answers both
# :80 and :443 so the Cloudflare->origin leg can be either "Flexible" (HTTP :80)
# or "Full (strict)" (HTTPS :443 with the Cloudflare Origin cert below). Prefer
# Full (strict). See deploy/CLOUDFLARE-TLS.md for the dashboard steps.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    # Cloudflare->origin TLS (SSL mode Full (strict)). Cert = Cloudflare Origin
    # CA cert; installed out-of-band, never committed. See deploy/CLOUDFLARE-TLS.md.
    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate     /etc/ssl/takeback/origin.pem;
    ssl_certificate_key /etc/ssl/takeback/private.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    server_name takeback.chain-of-thought.org;

    # --- Cloudflare origin hardening (added 2026-07-19) ---
    # Only accept connections proxied by Cloudflare. This stops anyone from
    # reaching the origin :80 directly and forging the CF-Connecting-IP header
    # the app rate-limits on. Ranges: https://www.cloudflare.com/ips
    # (refresh if Cloudflare changes them). We deliberately do NOT enable the
    # realip module: allow/deny must test the real TCP peer (Cloudflare);
    # realip would rewrite it to the client and break this allowlist.
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    deny all;

    # Allow image uploads (16 MB cap in the app; give headroom).
    client_max_body_size 20m;

    # Serve the debug APK for easy on-device install (optional convenience).
    # no-store keeps Cloudflare from caching it — otherwise a freshly deployed
    # APK is masked by the edge-cached old one until its TTL expires.
    location = /take-back.apk {
        alias /opt/takeback/take-back.apk;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename=take-back.apk';
        add_header Cache-Control 'no-store';
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # WebSocket upgrade for /ws and /api/events (proxied through cmd/web).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Keep long-lived signaling/events sockets alive.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
